*{box-sizing:border-box;margin:0;padding:0}:root{--bg:#f5f7fb;--card:#fff;--ink:#172033;--muted:#64748b;--line:#e2e8f0;--blue:#2563eb;--blue2:#1d4ed8;--teal:#0f766e;--amber:#f59e0b;--red:#dc2626;--shadow:0 10px 30px rgba(15,23,42,.08);--radius:18px}html{font-size:15px}body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;background:linear-gradient(180deg,#eef5ff 0%,#f8fafc 42%,#fff 100%);color:var(--ink);line-height:1.7;min-height:100vh}.hero{position:sticky;top:0;z-index:20;background:rgba(255,255,255,.92);backdrop-filter:blur(16px);border-bottom:1px solid rgba(226,232,240,.9)}.hero-inner{max-width:1180px;margin:0 auto;padding:18px 18px 14px}.kicker{font-size:12px;color:var(--blue2);font-weight:900;letter-spacing:.12em}h1{font-size:clamp(24px,4vw,40px);line-height:1.18;margin:4px 0;font-weight:900}.sub{color:var(--muted);font-size:14px}.stats{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px}.stat{background:#eff6ff;border:1px solid #bfdbfe;border-radius:999px;padding:6px 12px;color:#1e40af;font-weight:800;font-size:13px}.toolbar{max-width:1180px;margin:0 auto;padding:14px 18px 8px}.search{width:100%;padding:14px 16px;border:2px solid var(--line);border-radius:16px;font-size:16px;background:#fff;outline:none;box-shadow:0 4px 16px rgba(15,23,42,.04)}.search:focus{border-color:var(--blue)}.filters{display:flex;gap:8px;overflow-x:auto;padding:12px 0 4px;-webkit-overflow-scrolling:touch}.filter{white-space:nowrap;border:1px solid var(--line);background:#fff;border-radius:999px;padding:8px 13px;font-size:13px;font-weight:800;color:#475569;cursor:pointer}.filter.active{background:linear-gradient(135deg,var(--blue),var(--teal));color:#fff;border-color:transparent}.wrap{max-width:1180px;margin:0 auto;padding:10px 18px 90px}.count-line{color:var(--muted);font-size:14px;margin:8px 2px 14px}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(310px,1fr));gap:16px}.case-card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;transition:.2s;display:flex;flex-direction:column}.case-card:hover{transform:translateY(-2px);box-shadow:0 16px 36px rgba(15,23,42,.12)}.case-head{padding:16px 17px 13px;background:linear-gradient(135deg,#f8fbff,#ffffff);border-bottom:1px solid var(--line);cursor:pointer}.meta{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:9px}.id{font-size:12px;font-weight:900;color:var(--blue2);letter-spacing:.08em}.cat{font-size:12px;font-weight:800;color:#0f766e;background:#ccfbf1;border-radius:999px;padding:3px 9px}.person{font-size:18px;font-weight:900;line-height:1.35;margin-bottom:7px}.diag{display:inline-block;background:#fff7ed;border:1px solid #fed7aa;color:#9a3412;border-radius:999px;padding:3px 9px;font-size:12px;font-weight:800}.case-body{padding:15px 17px 17px;display:none}.case-card.open .case-body{display:block}.section{margin-bottom:12px}.section h3{font-size:13px;color:#334155;margin-bottom:4px;display:flex;align-items:center;gap:5px}.section p{font-size:14px;color:#334155}.complaint{background:#fffbeb;border-left:4px solid var(--amber);border-radius:12px;padding:10px 12px;color:#78350f}.analysis{background:#f0f9ff;border-left:4px solid var(--blue);border-radius:12px;padding:10px 12px}.diff{background:#f8fafc;border:1px dashed #cbd5e1;border-radius:12px;padding:10px 12px}.story{background:#f8fbff;border-left:4px solid var(--teal);border-radius:12px;padding:12px 13px;white-space:pre-line}.fivep{background:#f7fee7;border-left:4px solid #65a30d;border-radius:12px;padding:12px 13px;white-space:pre-line}.q-list{padding-left:20px;color:#334155;font-size:14px}.q-list li{margin:3px 0}.bottom{position:fixed;right:18px;bottom:18px;display:flex;gap:8px;z-index:30}.float{border:none;border-radius:999px;background:#0f172a;color:white;padding:11px 14px;font-weight:800;box-shadow:0 10px 28px rgba(15,23,42,.2);cursor:pointer}.empty{display:none;text-align:center;color:var(--muted);padding:40px 10px}@media(max-width:720px){.hero-inner{padding:14px 14px 10px}.toolbar{padding:10px 14px 6px}.wrap{padding:8px 14px 86px}.grid{grid-template-columns:1fr;gap:12px}.case-head{padding:15px}.case-body{padding:14px 15px}.bottom{left:14px;right:14px;justify-content:center}.float{flex:1}}

function card(c){return `<article class="case-card" data-id="${c.id}"><div class="case-head" onclick="this.parentElement.classList.toggle('open')"><div class="meta"><span class="id">${c.id}</span><span class="cat">${esc(c.category)}</span></div><div class="person">${esc(c.person)}</div><span class="diag">${esc(c.diagnosis)}</span></div><div class="case-body"><div class="section"><h3>情境化案例描述</h3><p class="story">${esc(c.story)}</p></div><div class="section"><h3>主诉 / 转介原因</h3><p class="complaint">${esc(c.complaint)}</p></div><div class="section"><h3>现病史与补充线索</h3><p>${esc(c.history)}</p></div><div class="section"><h3>课堂观察要点</h3><p class="analysis">${esc(c.observe||c.analysis)}</p></div><div class="section"><h3>5P概念化提示</h3><p class="fivep">${esc(c.fiveP||'')}</p></div><div class="section"><h3>建议追问方向</h3><ul class="q-list">${(c.questions||[]).map(q=>`<li>${esc(q)}</li>`).join('')}</ul></div><div class="section"><h3>鉴别诊断方向</h3><p class="diff">${esc(c.diff)}</p></div></div></article>`}
function renderFilters(){categories.forEach(cat=>filters.insertAdjacentHTML('beforeend',`<button class="filter" data-cat="${esc(cat)}">${esc(cat)}</button>`))}
function render(){const list=cases.filter(c=>(activeCat==='全部'||c.category===activeCat));grid.innerHTML=list.map(card).join('');countLine.textContent=`当前显示 ${list.length} / ${cases.length} 个案例${activeCat==='全部'?'':' · '+activeCat}`;empty.style.display=list.length?'none':'block';}
function toggleAll(open){document.querySelectorAll('.case-card').forEach(x=>x.classList.toggle('open',open))}
filters.addEventListener('click',e=>{const b=e.target.closest('.filter');if(!b)return;document.querySelectorAll('.filter').forEach(x=>x.classList.remove('active'));b.classList.add('active');activeCat=b.dataset.cat;render();});
renderFilters();render();
</script>
</body>
</html>
