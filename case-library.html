const cases = [{"id": "C001", "category": "心境障碍", "diagnosis": "重性抑郁障碍", "role": "高三女生", "person": "小雨，18岁，高三学生", "complaint": "近两个月明显情绪低落、成绩下降、上课走神，不再画画和看小说。", "history": "失眠、食欲下降、体重减轻，自责“对不起爸妈”，作文中出现“活着有什么意义”。", "analysis": "持续低落心境、兴趣减退、睡眠食欲改变、自责、功能损害；需重点评估自杀风险。", "diff": "适应障碍、双相障碍抑郁发作、躯体疾病或物质所致情绪问题。"}, {"id": "C002", "category": "心境障碍", "diagnosis": "持续性抑郁障碍", "role": "大学男生", "person": "阿哲，21岁，大三学生", "complaint": "长期觉得人生没意思，学习和社交都能维持，但总是“灰蒙蒙的”。", "history": "从高中开始几乎没有真正开心过，低自尊、疲乏、注意力差，偶有短期加重。", "analysis": "病程慢性、低落持续多年，功能未完全丧失但生活质量低。", "diff": "重性抑郁障碍、人格特质、甲状腺功能问题。"}, {"id": "C003", "category": "心境障碍", "diagnosis": "双相I型障碍", "role": "青年男性", "person": "小林，24岁，销售人员", "complaint": "家属称他一周来几乎不睡，连续投资、借钱创业，自称“很快改变世界”。", "history": "讲话滔滔不绝、思维奔逸，冲动消费，易怒，认为别人嫉妒他。", "analysis": "明显躁狂发作：睡眠需求减少、夸大、活动增多、冲动和功能损害。", "diff": "物质所致躁狂、精神分裂症、双相II型障碍。"}, {"id": "C004", "category": "心境障碍", "diagnosis": "双相II型障碍", "role": "研究生", "person": "小岚，26岁，研二学生", "complaint": "反复低落，每隔几个月会有几天特别兴奋、精力旺盛、写作效率极高。", "history": "兴奋期睡4小时也不累，话多、计划多，但未严重失控；低落期更长且痛苦。", "analysis": "反复抑郁伴轻躁狂线索，需追问持续时间和功能变化。", "diff": "重性抑郁障碍、环性心境障碍、正常情绪波动。"}, {"id": "C005", "category": "心境障碍", "diagnosis": "环性心境障碍", "role": "年轻教师", "person": "阿宁，29岁，小学教师", "complaint": "两年来情绪像坐过山车，时而精力旺盛，时而低落无力。", "history": "波动频繁但多数达不到完整躁狂或重性抑郁标准，人际关系受影响。", "analysis": "长期亚临床躁狂/抑郁波动，是心境稳定性问题。", "diff": "双相I/II型、边缘型人格障碍、压力相关反应。"}, {"id": "C006", "category": "心境障碍", "diagnosis": "经前烦躁障碍", "role": "大学女生", "person": "小桃，20岁，大二学生", "complaint": "每次月经前一周明显烦躁、哭泣、想退学，月经开始后缓解。", "history": "伴乳房胀痛、睡眠变差、暴食，周期性明显，平时功能基本正常。", "analysis": "症状与月经周期强相关，情绪和躯体症状均明显。", "diff": "重性抑郁障碍、广泛性焦虑障碍、普通经前综合征。"}, {"id": "C007", "category": "心境障碍", "diagnosis": "产后抑郁相关问题", "role": "新手母亲", "person": "晓敏，31岁，产后两个月", "complaint": "觉得自己不是好妈妈，经常哭，害怕独自照顾孩子。", "history": "睡眠不足、食欲差，对婴儿哭声高度紧张，偶有“消失就好了”的念头。", "analysis": "产后阶段出现抑郁、焦虑和育儿胜任感崩塌，需评估母婴安全。", "diff": "产后焦虑、产后精神病、正常产后适应。"}, {"id": "C008", "category": "焦虑障碍", "diagnosis": "广泛性焦虑障碍", "role": "职场女性", "person": "李女士，32岁， function card(c){return `<article class="case-card" data-id="${c.id}"><div class="case-head" onclick="this.parentElement.classList.toggle('open')"><div class="meta"><span class="id">${c.id}</span><span class="cat">${esc(c.category)}</span></div><div class="person">${esc(c.person)}</div><span class="diag">${esc(c.diagnosis)}</span></div><div class="case-body"><div class="section"><h3>主诉 / 转介原因</h3><p class="complaint">${esc(c.complaint)}</p></div><div class="section"><h3>现病史与补充线索</h3><p>${esc(c.history)}</p></div><div class="section"><h3>分析要点</h3><p class="analysis">${esc(c.analysis)}</p></div><div class="section"><h3>鉴别诊断方向</h3><p class="diff">${esc(c.diff)}</p></div></div></article>`}
function renderFilters(){categories.forEach(cat=>filters.insertAdjacentHTML('beforeend',`<button class="filter" data-cat="${esc(cat)}">${esc(cat)}</button>`))}
function render(){const q=search.value.trim().toLowerCase();const list=cases.filter(c=>(activeCat==='全部'||c.category===activeCat)&&Object.values(c).join(' ').toLowerCase().includes(q));grid.innerHTML=list.map(card).join('');countLine.textContent=`当前显示 ${list.length} / ${cases.length} 个案例${activeCat==='全部'?'':' · '+activeCat}`;empty.style.display=list.length?'none':'block';if(q)document.querySelectorAll('.case-card').forEach(x=>x.classList.add('open'))}
function toggleAll(open){document.querySelectorAll('.case-card').forEach(x=>x.classList.toggle('open',open))}
filters.addEventListener('click',e=>{const b=e.target.closest('.filter');if(!b)return;document.querySelectorAll('.filter').forEach(x=>x.classList.remove('active'));b.classList.add('active');activeCat=b.dataset.cat;render();});
search.addEventListener('input',render);renderFilters();render();
</script>
</body>
</html>
