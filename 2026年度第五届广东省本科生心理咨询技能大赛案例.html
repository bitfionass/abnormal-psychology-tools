<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;line-height:1.8;color:#333;background:#f0f2f5}
.container{max-width:960px;margin:0 auto;padding:20px 16px}
.header{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff;padding:36px 24px;text-align:center;border-radius:16px;margin-bottom:24px;box-shadow:0 4px 20px rgba(102,126,234,0.3)}
.header h1{font-size:22px;margin-bottom:6px;font-weight:600}
.header p{opacity:0.85;font-size:14px}
/* Action buttons */
.action-bar{display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap}
.btn{padding:14px 28px;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;transition:all 0.2s;display:inline-flex;align-items:center;gap:8px}
.btn-random{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;box-shadow:0 2px 10px rgba(102,126,234,0.3)}
.btn-random:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(102,126,234,0.4)}
.btn-all{background:#fff;color:#667eea;border:2px solid #667eea;box-shadow:0 2px 8px rgba(0,0,0,0.06)}
.btn-all:hover{background:#f0f0ff;transform:translateY(-1px)}
.btn-back{background:#fff;color:#666;border:1.5px solid #ddd;display:none}
.btn-back:hover{border-color:#667eea;color:#667eea}
/* Stats */
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:12px;margin-bottom:20px}
.stat-card{background:#fff;padding:14px;border-radius:10px;box-shadow:0 1px 4px rgba(0,0,0,0.06);text-align:center}
.stat-card .num{font-size:24px;font-weight:700;color:#667eea}
.stat-card .label{font-size:12px;color:#888;margin-top:2px}
/* Controls */
.controls{background:#fff;padding:20px;border-radius:10px;box-shadow:0 1px 4px rgba(0,0,0,0.06);margin-bottom:20px;display:none}
.controls.show{display:block}
.search-box{width:100%;padding:12px 16px;border:2px solid #e0e0e0;border-radius:8px;font-size:15px;outline:none;transition:border-color 0.2s}
.search-box:focus{border-color:#667eea}
.theme-tags{display:flex;flex-wrap:wrap;gap:8px;margin-top:14px}
.theme-tag{padding:5px 14px;border-radius:20px;font-size:13px;cursor:pointer;transition:all 0.2s;border:1.5px solid #ddd;background:#fff;color:#555}
.theme-tag:hover{border-color:#667eea;color:#667eea}
.theme-tag.active{background:#667eea;color:#fff;border-color:#667eea}
/* Random display */
.random-display{display:none}
.random-display.show{display:block}
.random-card{background:#fff;border-radius:14px;padding:32px;box-shadow:0 4px 20px rgba(0,0,0,0.1);margin-bottom:20px;border-left:5px solid #667eea}
.random-card .case-num{font-size:16px;color:#667eea;font-weight:700;margin-bottom:6px}
.random-card .case-themes{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px}
.random-card .case-theme-tag{padding:2px 8px;border-radius:10px;font-size:11px;background:#f0f0f0;color:#777}
.random-card .case-content{font-size:15px;color:#444;white-space:pre-line;line-height:2}
.random-actions{display:flex;gap:12px;margin-top:20px}
/* Cases list */
#cases-list .case-card{background:#fff;border-radius:12px;padding:24px;margin-bottom:16px;box-shadow:0 1px 4px rgba(0,0,0,0.06);transition:transform 0.15s,box-shadow 0.15s}
#cases-list .case-card:hover{transform:translateY(-2px);box-shadow:0 4px 16px rgba(0,0,0,0.1)}
.case-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px;gap:12px}
.case-num{font-size:15px;color:#667eea;font-weight:700;white-space:nowrap}
.case-themes{display:flex;gap:6px;flex-wrap:wrap;justify-content:flex-end}
.case-theme-tag{padding:2px 8px;border-radius:10px;font-size:11px;background:#f0f0f0;color:#777}
.case-content{font-size:14px;color:#444;white-space:pre-line;line-height:1.9}
.no-result{text-align:center;padding:60px 20px;color:#999;font-size:16px}
@media(max-width:600px){
.container{padding:12px 8px}
.header{padding:24px 16px}
.header h1{font-size:18px}
.case-card{padding:16px}
.btn{padding:12px 20px;font-size:14px}
.random-card{padding:20px}
}
</style>

<div class="container">
<div class="header">
  <h1>📋 2026年度第五届广东省本科生心理咨询技能大赛案例（100例）</h1>

<!-- All cases view -->

    <input type="text" class="search-box" id="search" placeholder="🔍 搜索案例内容（如：焦虑、失恋、家庭、学业、自伤...）">
    <div class="theme-tags" id="theme-tags"></div>
  </div>
  <div id="cases-list"></div>
</div>

<script>
const CASES = [  {num:1, themes:['学业压力','人际关系','家庭问题','情绪问题','恋爱情感','完美主义','躯体化'], content:'一般资料：小哲，男，14 岁，初二学生，首次辅导。\n基本信息：小哲小学阶段成绩稳居班级前列，性格开朗自信，是老师眼中的优等生、同学心中的榜样。升入初中后，学科数量增加、知识难度提升，他未能及时调整学习方法，第一次月考成绩跌至班级中游，巨大的落差让他难以接受。他性格敏感多疑，害怕被同学嘲笑 “小学厉害初中变笨”，上课即便有思路也不敢举手发言，遇到难题宁愿独自纠结也不向老师和同学请教，逐渐封闭自己。近期期中考试再次失利，父母不理解他的适应困境，一味批评他 “学习不用心、贪玩懈怠”，双重压力下他开始出现严重厌学情绪，每天早上谎称头痛、腹痛拒绝上学，夜间频繁失眠多梦，睡着后也常因考试场景惊醒，情绪持续低落、对任何事物提不起兴趣，在班主任多次劝说与家长配合下，前来心理辅导室接受辅导。'},  {num:2, themes:['学业压力','人际关系','情绪问题','恋爱情感','生涯迷茫','完美主义','躯体化'], content:'一般资料：小诺，女，20 岁，大二中医专业学生，首次咨询。\n基本信息：小诺就读于双一流高校中医学专业，从小养成完美主义性格，凡事追求尽善尽美，不容许自己有任何失误。大学期间她同时加入校学生会、专业学习小组、志愿者社团，还报名了多项技能证书考试，试图兼顾学业、工作与个人提升，每天日程排得满满当当。近期期末考核、社团换届、证书考试时间高度冲突，她的压力急剧增加，出现注意力严重涣散、学习工作效率大幅低下的问题。她总陷入 “必须做好所有事” 的执念，担心自己无法完成任务、被身边优秀同学超越，频繁出现心慌、胸闷、手心出汗等躯体症状，对曾经热爱的金融知识、社团活动失去兴趣，甚至产生逃避学业的想法，意识到状态异常后，主动前来心理咨询室缓解压力。'},  {num:3, themes:['人际关系','家庭问题','自我认同'], content:'一般资料：小航，男，10 岁，四年级学生，第二次辅导。\n基本信息：小航父母常年在外地务工，每年仅春节回家一次，他从小由爷爷奶奶照顾，隔代的关爱无法弥补亲子陪伴的缺失，内心极度渴望父母的关注与拥抱。班级组织亲子手工大赛，他提前一周期待父母能请假回来，最终还是落空，活动当天看到其他同学和父母亲密合作、开心互动，他独自坐在角落沉默，还被个别调皮同学调侃 “没有爸妈疼”。这件事成为导火索，他从此变得自卑孤僻，不愿和同学交流玩耍。为了吸引老师和家人的关注，他开始故意调皮捣蛋、破坏课堂纪律、拖欠作业，同时把内心的委屈发泄在爷爷奶奶身上，经常无故发脾气、摔东西，内心既渴望被爱又充满无助与矛盾，由家人带来寻求心理帮助。'},  {num:4, themes:['学业压力','人际关系','网络成瘾','生涯迷茫','完美主义'], content:'一般资料：林浩，男，21 岁，大三计算机专业学生，首次咨询。\n基本信息：升入大三之后，身边同班同学都陆续规划好了发展路径，一部分专心备战专业考研，一部分着手准备各类职业证书考试，还有部分同学进入企业进行顶岗实习。林浩却一直找不到前行方向，内心十分彷徨。家人期盼他毕业后留在本地进入国企工作，工作稳定、压力较小，他本身却向往互联网行业，想要从事短视频运营、独立接单做技术项目，可又担心自身经验欠缺，尝试后得不到理想结果，遭到亲友质疑。他整日机械地待在自习室、浏览各类行业资讯，表面十分忙碌，实际没有任何实质进展。他时常贬低自己，认为个人规划混乱、专业能力平平，对未来感到十分悲观。夜晚常常思虑过度、辗转难眠，日间状态疲惫、听课注意力涣散，在好友的劝说与陪同下，主动来到心理咨询室寻求帮助。'},  {num:5, themes:['学业压力','人际关系','自我认同','情绪问题','恋爱情感','网络成瘾','生涯迷茫'], content:'一般资料：小欣，女，20 岁，大二英语专业学生，首次咨询。\n基本信息：小欣与男友在大一社团活动中相识相恋，两人感情稳定，曾一起规划未来的学习与生活。半年前，男友以 “性格不合、未来规划不同” 为由提出分手，随后很快与其他女生交往。这次失恋对小欣打击巨大，她无法接受现实，反复回想恋爱细节，陷入自我否定，认为是自己不够好、不够优秀才被抛弃。分手后她长期情绪低落，经常在深夜独自哭泣，食欲明显下降，上课注意力无法集中，经常走神、发呆，甚至出现逃课、不愿与人交流的情况。她试图通过刷手机、熬夜麻痹自己，但依旧无法缓解痛苦，一看到与恋爱相关的场景就情绪崩溃，学习成绩明显下滑，对未来感到迷茫无助。在室友的关心与劝说下，她主动来到学校心理咨询室，希望走出失恋阴影，恢复正常的学习与生活状态。'},  {num:6, themes:['学业压力','人际关系','家庭问题','自我认同','情绪问题','生涯迷茫','完美主义','躯体化'], content:'一般资料：小桐，女，15 岁，初三学生，首次辅导。\n基本信息：小桐因天生身材微胖，从初二开始被部分同学恶意起外号、私下调侃、孤立排挤，长期遭受校园隐性欺凌。她性格懦弱，不敢反抗也不敢告诉老师和父母，只能默默忍受委屈。随着中考临近，学习压力增大，校园欺凌带来的心理创伤愈发严重，她逐渐害怕去学校，每天上学前都极度焦虑，回避所有集体活动，不敢与同学对视交流，总觉得他人在背后议论自己、嘲笑自己。长期的精神压抑让她出现厌食、失眠、自卑自闭等问题，学习成绩直线下滑，班主任发现她的异常状态后，及时与家长沟通，建议其接受专业心理辅导。'},  {num:7, themes:['学业压力','家庭问题','情绪问题','躯体化'], content:'一般资料：小泽，男，16 岁，高一重点班学生，首次辅导。\n基本信息：小泽以中考全校前十的优异成绩，考入重点高中重点班，初中时的成绩优势在高手云集的重点班彻底消失，第一次月考成绩仅为班级中等水平。他无法接受自己从 “优等生” 变为 “普通生” 的现实，变得敏感易怒、脾气暴躁，学习时精神过度紧绷，哪怕一道题做错、一次小测失利，就疯狂自我指责、否定自己。长期处于高压内耗状态，他出现严重失眠、经常性头痛、注意力不集中等问题，对学习产生本能恐惧，一进教室就心慌，父母意识到问题严重性，陪同前来心理辅导室接受辅导。'},  {num:8, themes:['家庭问题'], content:'一般资料：小蕊，女，11 岁，五年级学生，第二次辅导。\n基本信息：小蕊父母生育二胎弟弟后，将全部精力与关爱放在年幼的弟弟身上，彻底忽略了她的心理需求与情感感受。她觉得父母偏心、不爱自己，为了获得关注，开始故意与弟弟争抢玩具、零食、生活用品，频繁顶撞父母、故意惹麻烦。近期弟弟不小心弄坏了她珍藏多年的笔记本，那是她小学阶段所有的美好回忆，她情绪彻底失控大哭大闹，事后又因吓到弟弟陷入深深自责。她内心既渴望得到父母的平等关爱，又因委屈而痛苦挣扎，每天都在矛盾中度过，主动来到心理辅导室倾诉内心痛苦。'},  {num:9, themes:['学业压力','家庭问题','网络成瘾','生涯迷茫'], content:'一般资料：小琛，男，15 岁，初三学生，首次辅导。\n基本信息：小琛从初一开始痴迷网络游戏，把大量课余时间甚至上课时间都投入到游戏中，经常熬夜打游戏、上课偷偷玩，导致学习成绩一落千丈，从班级中等跌至下游。父母发现后强行没收手机、断网，严厉管控他的作息，这让他产生强烈的叛逆心理，开始逃课去网吧、与父母激烈争吵、摔东西反抗。他内心明知沉迷游戏不对，也清楚中考临近的重要性，却无法控制自己的游戏欲望，同时对中考结果感到极度迷茫，害怕自己彻底失败、前途尽毁，在班主任多次劝说与心理引导下，前来接受辅导。'},  {num:10, themes:['学业压力','人际关系','家庭问题','自我认同','情绪问题','完美主义'], content:'一般资料：小妍，女，19 岁，大一新生，首次咨询。\n基本信息：小妍来自偏远县城的普通农村家庭，父母以务农和打零工为生，家庭经济条件拮据。她从小懂事刻苦，凭借多年苦读，以全县前列的成绩考入一线城市重点大学，成为村里少有的大学生，入学前对大学生活充满憧憬与期待。入学后，宿舍共住四人，舍友均来自城市中产家庭，穿着时尚、消费大方，经常聚餐、购物、出游；而小妍衣着朴素、生活费有限，很难插入共同话题。她内心极度自卑，害怕被舍友看不起、被悄悄排斥，因此不敢主动交流、不敢参与宿舍活动。她每天过着食堂 — 教室 — 图书馆三点一线的生活，独来独往，不敢麻烦别人。同时，大学开放式课堂、自主学习、小组合作的模式，与高中高强度灌输式学习差异巨大，她一时无法适应，学习效率下降，进一步加重自我怀疑。长期的孤独、自卑、焦虑与无助交织，她常常深夜躲在被子里默默流泪，出现入睡困难、注意力不集中、情绪低落等状况，担心自己无法完成学业、辜负家人期望。在难以承受心理压力后，她鼓起勇气，主动前往学校心理咨询室求助。'},  {num:11, themes:['学业压力','家庭问题','情绪问题','恋爱情感'], content:'一般资料：小峰，男，12 岁，六年级学生，首次辅导。\n基本信息：小峰小学三年级时父母离异，之后双方各自再婚。离异后，小峰按约定在父亲家和母亲家轮流居住，每周更换一次生活环境，长期缺乏固定房间、稳定作息和归属感。在父亲家中，他觉得自己需要适应继母的生活习惯；在母亲家中，母亲主要照顾年幼的弟弟，继父与他关系疏离。小峰性格内向孤僻，在校很少主动交往，学习动力不足，成绩长期靠后，也缺乏稳定兴趣。近期，父母因抚养费、升学择校及课外辅导费用发生激烈争吵，互相指责，小峰目睹全过程后情绪崩溃，认为自己是父母的负担。此后他明显厌学，拒绝上学和完成作业，常把自己关在房间里，不愿进食、交流或与人目光接触。学校与社区联合转介后，父母陪同其接受心理辅导。'},  {num:12, themes:['学业压力','家庭问题','情绪问题','恋爱情感','躯体化'], content:'一般资料：小萱，女，14 岁，初二学生，首次辅导。\n基本信息：小萱父母均受过良好教育，对她学业要求极高，长期以成绩和排名作为评价标准。小萱自幼热爱绘画，曾希望将来从事艺术相关工作，但父母认为绘画会影响学习，严格限制她的兴趣发展。近期一次月考中，小萱因成绩未达到父母规定名次受到长时间训斥，父母还撕毁她珍藏的画稿、没收绘画工具，并增加学习任务。此后，小萱出现明显情绪低落、频繁哭泣、拒绝写作业和上学等表现，多次表达“活着没意思”“不想再被控制”。同时伴有失眠、噩梦、食欲下降、体重减轻，并出现用小刀划伤手腕的自伤行为。她对父母强烈抵触，主动前来寻求心理帮助。'},  {num:13, themes:['人际关系','家庭问题','自我认同','情绪问题','生涯迷茫','完美主义','躯体化'], content:'一般资料：小宇，男，21 岁，大四计算机专业学生，首次咨询。\n基本信息：小宇就读计算机专业，大四面临毕业，全身心投入求职，先后投递数十家互联网企业，却因项目经验不足、面试表达不流畅，屡屡遭遇求职碰壁，至今没有拿到任何录用通知。他来自普通工薪家庭，一辈子踏实勤恳，把全部希望都寄托在小宇身上，常告诉他 “考上大学、进大厂工作，才能改变家庭命运”。父母省吃俭用供他读书，从不舍得为自己花钱，却全力支持他的学费与生活费，这份沉重的期待让小宇一直背负着巨大心理压力。他每天看到身边同学陆续拿到大厂 offer、顺利确定就业方向，焦虑崩溃，经常整夜失眠多梦、食欲不振、心慌胸闷，一想到求职与毕业就情绪失控。他不敢把求职失利的真相告诉父母，只能谎称 “正在等结果”，害怕父母失望、伤心、指责自己没用。在学校就业指导老师的反复劝说与鼓励下，他终于放下心理负担，前来心理咨询室寻求帮助。'},  {num:14, themes:['学业压力','人际关系','家庭问题','情绪问题','恋爱情感'], content:'一般资料：小晴，女，16 岁，高二学生，首次辅导。\n基本信息：小晴天生性格内向、敏感、不善言辞，从小不擅长人际交往，进入高中后，因无法快速融入集体，在班级里几乎没有朋友，长期处于被孤立的状态。对他人的言语、眼神极度敏感，同学一句无心的话、一个不经意的表情，都能让她反复琢磨、痛苦很久，甚至整夜失眠。近半年来，小晴情绪开始出现明显两极波动，情绪高涨期，她会突然变得异常兴奋、话多、精力旺盛，制定不切实际的学习计划，冲动购买大量文具与资料，觉得自己 “马上就能变好、就能被所有人喜欢”，一点小事就暴躁发火、摔东西，与同学发生冲突。没过多久又陷入重度抑郁状态，沉默流泪、不愿见人，觉得自己一无是处、没人会真正喜欢自己，对任何事情提不起兴趣，反复出现“不如死了算了”的消极想法。上课注意力涣散、频繁走神，记忆力明显下降，学习成绩持续大幅下滑。父母最初以为只是 “内向、想太多”，直到发现她时而亢奋冲动、时而沉默自伤，情绪完全失控，才意识到问题严重，急忙陪同前来接受心理辅导。'},  {num:15, themes:['学业压力','人际关系','家庭问题','情绪问题','恋爱情感'], content:'一般资料：小睿，男，9 岁，三年级学生，首次辅导。\n基本信息：小睿是家中独子，从小被爷爷奶奶、父母过度溺爱，家人对他百依百顺、包办所有事情，导致他自理能力极差、抗挫折能力为零。进入小学集体生活后，他不会整理书包、不会系鞋带、不会保管学习用品，经常丢三落四；手工课、劳动课任务无法独立完成，只能求助他人，一旦被拒绝就情绪失控。他害怕失败、害怕被批评、害怕不如别人，遇到一点难题就哭闹、耍赖、放弃，课堂上被老师点名回答不出问题会当场大哭，考试成绩不理想就直接撕毁试卷、摔文具、在教室哭闹不止，甚至躺地不起。他与同学相处时以自我为中心，不愿分享、不懂谦让，稍不顺心就发脾气、推搡同学，频繁与同伴发生矛盾，逐渐被同学疏远排斥。近期，小睿因一次小组合作任务失败，在课堂上情绪爆发，大喊大叫、摔砸桌椅，出现明显的冲动易怒、情绪崩溃等表现。父母逐渐意识到溺爱带来的教育问题，担心影响他的成长，特意带他前来接受心理辅导，帮助其调整心态、提升抗挫力。'},  {num:16, themes:['学业压力','人际关系','生涯迷茫','完美主义'], content:'一般资料：陈泽，男，20岁，大二视觉传达专业学生，第二次咨询。\n基本信息：陈泽来自三四线城市，考入省会高校视觉传达专业，入学后始终无法适配大学灵活开放的专业教学模式。专业课教师多采用开放式命题，侧重鼓励学生自主构思、大胆创新创作，长期习惯应试化固定题型、标准化答题模式的他，总是过度纠结创作标准，反复斟酌评分要点、害怕作品偏离教学要求，创作时畏手畏脚、迟迟无法推进，最终产出的作品刻板生硬、缺乏新意，专业成绩始终处于班级中下游。目睹身边同学能够快速构思、创作出极具创意的作品，频繁得到老师认可与夸赞，他开始深度怀疑自身专业天赋和学习能力。生活中，同班室友大多性格开朗、擅长社交，课余经常结伴聚餐、团建活动，偏爱独处、喜好安静的他难以融入集体氛围，内心倍感疏离却不敢主动沟通、表达自身想法。长期的学业压力与人际困扰让他滋生抵触心理，逐渐懈怠专业课学习、刻意回避集体社交，上课频繁走神、偶尔缺勤，对专业学习和未来发展充满迷茫，在首次咨询后主动复诊，进行第二次心理咨询。'},  {num:17, themes:['人际关系','自我认同','情绪问题','恋爱情感'], content:'一般资料：小彤，女，17 岁，高二学生，首次辅导。\n基本信息：小彤左侧脸颊靠近眼角处有一块明显的黑色胎记，从小学起就因外貌特征被同学起侮辱性外号、恶意模仿、背后议论，长期遭受校园言语霸凌与孤立。那时她不敢告诉老师和家长，只能默默忍受，内心埋下深深的自卑与创伤，变得极度敏感、恐惧他人目光，刻意低头遮脸、回避成为焦点。最近，学校为迎接校庆组织文艺汇演，班级推选她参与舞蹈节目，她因担心胎记被众人关注、被同学嘲笑，坚决拒绝登台，事后陷入深度自我否定，觉得自己又丑又没用。她开始不敢照镜子、回避所有社交场合，不愿和同学说话、不参与班级活动，情绪持续低落、抑郁，学习状态一落千丈，在家人反复劝说与鼓励下，前来接受心理辅导。'},  {num:18, themes:['学业压力','家庭问题','情绪问题','完美主义','躯体化'], content:'一般资料：小超，男，16 岁，高一学生，首次辅导。\n基本信息：小超父母关系长期紧张，在家中频繁争吵、冷战、互相指责，家里常年氛围压抑冰冷。升入高中后，学习压力明显增大，家庭矛盾带来的心理压力不断累积。近三个月来，小超开始出现严重的疑病症状，总无端怀疑自己身患重病：一有点胸闷就坚信自己心脏出问题，稍微头晕就担心脑部有病变，肚子不舒服就恐惧得了严重肠胃疾病。他频繁上网搜索疾病症状，越查越害怕，反复对照后更加确信自己 “病得很重”。每天回家只要听到父母争吵，他就立刻心慌、手抖、呼吸急促，紧接着出现头痛、胃痛、乏力等躯体不适，随后陷入更强烈的疑病恐惧中，害怕自己突然发病、没人照顾，甚至恐惧自己会突然离世。他上课频繁走神、注意力无法集中，满脑子都是对疾病的担忧，学习成绩持续下滑。夜间经常惊醒、做噩梦，醒来后更加怀疑身体异常，反复摸脉搏、量体温，反复确认自己 “还活着、没出事”。班主任发现他精神萎靡、恐惧不安、状态很差，建议他来接受心理辅导。'},  {num:19, themes:['学业压力','人际关系','家庭问题','情绪问题','完美主义','躯体化'], content:'一般资料：小雯，女，18 岁，高三学生，首次辅导。\n基本信息：小雯从高一到高二一直是班级佼佼者，稳居年级前列，习惯了名列前茅的优越感，老师和父母都对她寄予厚望。进入高三后，竞争压力急剧增大，一次全市联考中，她因状态不佳成绩跌至年级三十名，巨大的落差让她无法接受现实，陷入极度焦虑。她开始过度关注他人的学习进度与成绩，总担心被同学超越，学习时精神高度紧张、强迫自己熬夜刷题，出现记忆力下降、失眠、头痛等问题，甚至一进考场就紧张到发抖，为了调整备考状态，主动前来咨询。'},  {num:20, themes:['人际关系','家庭问题','自我认同','情绪问题','生涯迷茫'], content:'一般资料：小江，男，19岁，大一金融学专业学生，第三次咨询。\n基本信息：小江长期在父亲的严格管控下成长，从小到大的学习作息、课外补习、升学选择均由父亲全权规划，如今就读的金融学专业也是家人结合就业前景强制填报，他本人对专业学习毫无热情与认同感。步入大学后，脱离了家人全方位的约束与督促，他非但没有感到轻松，反而彻底失去前进目标，陷入深度迷茫。他观察到身边同学大多兴趣广泛、擅长文体活动、人际交往游刃有余，反观自己常年只专注应试学习，毫无特长与社交经验，性格内敛不善言辞，由此产生强烈的自卑心理，时常觉得自己平庸无用。大学自由充裕的课余时光让他无所适从，终日内心空虚、情绪低落，常常陷入无端内耗，心情压抑难以纾解。室友察觉他长期情绪消极、状态低迷，持续开导陪伴他。经过前两次咨询后，为彻底调整心理状态、摆脱负面情绪，他主动预约第三次心理咨询。'},  {num:21, themes:['学业压力','人际关系','家庭问题','自我认同','情绪问题'], content:'一般资料：小冉，女，9岁，小学四年级，第一次心理辅导。\n基本信息：小冉为独生女，家庭条件优越。父母均为高学历企业从业者，日常工作十分忙碌，无暇顾及孩子的陪伴与教育，孩子的日常饮食起居全程由外公外婆照料。但父母格外看重孩子的学业成果，对其学习成绩抱有极高的期待，为她报名了多款高端学科辅导与艺术特长课程，秉持唯成绩论的教育观念，认为学业优异就是成长的全部。长期的优待与夸赞，让小冉极度自负，坚信自己是班级乃至年级最优秀、最出色的学生。日常相处中，她干预同学做题，随意点评、轻视他人的学习能力，经常调侃、贬低身边同学，言语带有嘲讽意味。班级同学大多对她心生抵触，不愿与她交往相处，但小冉始终认为是同学能力不足、配不上与自己为伍。近期班级开展文艺委员竞选，最终当选的是一名性格温柔、乐于帮助同学的女生。小冉内心十分不服，认为对方才艺、成绩均不如自己，无法理解自己落选的结果。为此她情绪极度失控，在校期间当众顶撞班主任，和同学吵架，在家中频繁哭闹、暴躁易怒，整日闷闷不乐、抗拒进食，情绪和行为出现明显异常，家长十分担忧，主动带其前来接受心理辅导。'},  {num:22, themes:['学业压力','家庭问题','情绪问题','恋爱情感','生涯迷茫','躯体化'], content:'一般资料：小诺，女，15 岁，高一学生，第三次接受心理辅导。\n基本信息：小诺的父母注重孩子学业发展，长期为她制定严密的学习规划，日常行程被学习填满，几乎没有发展个人爱好的空间。小诺从小到大学习表现稳定优异，也一直很喜欢唱歌，瞒着家人加入校内合唱社团。社团汇演结束后这件事被父母得知，父母以影响学业为由，强硬要求她退出社团，彻底断绝她唱歌的想法。矛盾爆发后，小诺情绪与行为出现明显偏差：近两周不交作业、上课态度散漫，甚至擅自缺课，被班主任多次谈话劝导。居家期间她拒绝和父母对话，常常独处至深夜，存在失眠、食欲不振等躯体表现。家长发现她的私密本子里写满悲观负面的话语。班主任发现她的身心状态持续变差，沟通后建议她持续接受心理辅导。'},  {num:23, themes:['学业压力','人际关系','家庭问题','情绪问题','恋爱情感','生涯迷茫'], content:'一般资料：小冉，女，16岁，高一学生，第一次辅导。\n基本信息：小冉的父母均为国企从业者，从小向她灌输“学好工科更稳定，艺术毫无用处”的观念，早早替她敲定了选科组合，规划未来报考工科类专业。小冉自幼喜欢绘画和艺术创作，艺术类课程表现突出。父母均在国企工作，认为工科专业更稳定，较早替她规划了理科选科和未来专业方向。进入高中后，小冉难以适应理科学习节奏，虽然努力刷题、整理错题并请教老师，理科成绩仍持续不理想。临近选科，小冉提出希望选择艺术相关方向，但遭到父母反对。她一方面理解父母追求稳定的考虑，担心辜负家长期望；另一方面又强烈抵触继续学习理科，对未来感到迷茫和焦虑。近期她上课注意力下降，常发呆沉默，情绪低落，并伴有入睡困难、睡眠浅、食欲减退等情况。在朋友建议下，她主动前来接受心理辅导。'},  {num:24, themes:['学业压力','家庭问题','自我认同','情绪问题','躯体化'], content:'一般资料：小桐，女，17岁，高二理科生，第一次辅导。\n基本信息：小桐的母亲从事科研工作，对其学业期待极高，平日里常拿身边优秀学子与其对比，反复强调学科竞赛荣誉对升学的重要价值。原本小桐学业稳定优异，稳居年级前列，在参加市级重点化学竞赛落选后，整体文化课考试成绩大幅下滑，跌落至年级中游位置。任课老师观察到，她每逢大型测验都会出现手心发汗、肢体紧绷、呼吸急促的状态，对考场环境十分敏感，自述考场上听到笔尖书写、纸张翻动的声响，就会心慌心悸、反胃不适。竞赛落选后，母亲十分失望，批评她平日的兴趣钻研毫无意义，耗费时间却换不来升学优势。接连的挫败与家人的否定，让小桐产生严重的自我否定心理，认为自己辜负了家人的付出与培养，不配拥有优质的学习资源。后续多次校内考试，她都因过度焦虑无法正常应试，常常借口身体不适躲避测验、缺席考试。班主任察觉其异常的考试回避行为与低落状态，多次沟通疏导无效后，建议她前来接受心理辅导。'},  {num:25, themes:['学业压力','人际关系','家庭问题','恋爱情感'], content:'一般资料：小宇，男，13岁，初一学生，本次为第二次心理辅导。\n基本信息：小宇是一名初一在校生，在校期间，小宇情绪稳定性较差，性格敏感急躁，极易因小事与同学产生矛盾争执，偶尔出现言语顶撞、刻意孤立同学的行为，班级人际关系疏离、交友困难。课堂上自律性较弱，时常走神发呆、小动作较多，不配合课堂管理，偶尔消极回应老师的教育引导，学业成绩出现明显波动与下滑。家长反馈，小宇居家期间情绪抵触明显，常因作息、学习、生活琐事与家人产生争吵，需求未被满足时会赌气沉默、拒绝沟通，无法正视自身的情绪和行为问题。小宇自幼父母长期异地分居，主要由外公外婆照料生活起居，长辈过度纵容迁就，对其行为习惯缺乏约束教育；近半年母亲结束异地回归家庭，开始严格规范其学习和生活作息，沟通方式多为说教、指责式，导致小宇内心抵触情绪强烈，负面情绪长期压抑无法合理宣泄，近期情绪和行为问题愈发突出，适应校园和家庭生活出现明显困难。'},  {num:26, themes:['学业压力','家庭问题','生涯迷茫'], content:'一般资料：小航，男，13岁，初一学生，第二次辅导。\n基本信息：小航父母长期在外省务工，常年归家次数极少，自孩童时期起便独自跟随外婆定居生活。外婆年事偏高，思想传统刻板，家庭教育方式较为粗放严苛，日常教育缺少耐心引导。每当小航出现行为失误、学习松懈、做事不顺心意时，外婆常会对其进行严厉指责，反复告知他“父母不在身边，没人管束、放弃自己未来无望”，长期的负面言语暗示，让小航内心根深蒂固地形成被遗弃、无人关心的消极认知。升入初一后，面对全新的学习节奏、陌生的人际环境和繁重的学业任务，小航始终无法适应初中校园生活，难以融入班级同伴圈子，学习状态持续低迷，成绩不断下滑。同时，长期压抑的情绪让他出现自我伤害行为，心情低落时会反复抠咬指尖、抓挠手臂。据班主任观察，小航性格孤僻内向，极度被动，在校从不主动与人交往，身边没有固定玩伴。入学之初学习成绩尚可，处于班级中等梯队，经过一学期的适应不良，成绩快速下滑至班级下游。在班主任的持续开导和推荐下，来访者主动来到心理辅导室进行系统心理辅导。'},  {num:27, themes:['人际关系','家庭问题','自我认同','情绪问题','生涯迷茫'], content:'一般资料：小娜，女，13岁，初一在读，第一次辅导。\n基本信息：小娜来自农村，家庭经济条件普通，难以兼顾她的心理陪伴与综合素质培养，仅能保障基本生活起居。小诺格外懂事自律，深知家庭不易，始终刻苦钻研学习，凭借自身努力考入城区优质初中。进入新环境后，身边同学大多家境优越、多才多艺、穿搭时尚，而小诺常年朴素穿搭，带着乡村生活习惯，谈吐质朴，因此时常遭到部分同学的私下议论、调侃排挤。长期的负面评价让小诺产生强烈的自我否定，说话变得小心翼翼、音量微弱，日常行走姿态拘谨，不敢与人对视。她对比身边优秀的同学，因自身没有才艺、眼界有限、生活条件普通而深感自卑，总觉得自己时刻处于他人的议论目光中，长期处于紧张焦虑、自我怀疑的状态，主动来到心理辅导室寻求专业帮助。'},  {num:28, themes:['学业压力','家庭问题','情绪问题','生涯迷茫','完美主义','躯体化'], content:'一般资料：小泽，男，14岁，初二学生，第二次辅导。\n基本信息：小泽父母为事业单位工作人员，对孩子抱有极高的期待，长期对其实施极致的高标准、严要求的完美式教育。父母不允许他出现成绩失误，要求各科成绩必须稳居班级前列，课余时间被学科补习、特长训练全部填满，几乎没有自主休闲时间。小泽从小性格温顺听话，一直遵从父母的安排刻苦学习，进入初二学业难度提升后，突发严重的上学抵触情绪。每日晨起都会出现头晕、恶心、心慌等躯体不适症状，无法正常到校上课，多次就医检查均未发现器质性病变，确诊为躯体化症状反应。小泽向心理老师倾诉，自己极度害怕考试失利、害怕成绩单上的低分，频繁做与学业压力相关的噩梦。他十分羡慕能够自由玩耍、拥有课余时间的同龄人，内心极度渴望放松休息，却因畏惧父母失望、不敢违背家长意愿，长期压抑自我。经班主任与校医联合评估，建议其接受专业心理辅导干预。'},  {num:29, themes:['学业压力','人际关系','情绪问题','网络成瘾','生涯迷茫','躯体化'], content:'一般资料：小杨，男，20岁，大二学生，第二次咨询。\n基本信息：小杨步入大学后，他满怀憧憬，希望全面提升自我，大一上学期积极报名各类学生组织与志愿活动，主动争取各类评优、实践机会，想要凭借自身努力证明自己的能力。但长期付出后，他的工作成果常常被忽视，多次的付出得不到学长学姐和团队的认可，时常被否定工作价值。学期末社团换届选拔中，兢兢业业的小杨最终落选，未能留任部门。大一下学期开始，小杨心态彻底失衡，对学习、社团、人际交往全部丧失兴趣，认为所有努力都毫无意义，唯独在网络游戏中能够获得成就感和他人的认可。自此他开始封闭自我，不愿与人交往、极少出门，频繁旷课，长期熬夜沉迷游戏。作息颠倒、昼夜混乱的生活状态让他身心状态大幅下滑，整日精神萎靡、昏沉乏力，伴随头晕、体虚等躯体不适。同时，因长期熬夜打游戏、电子设备外放声音过大，多次打扰室友休息，与宿舍同学矛盾持续激化，人际关系愈发疏远。目前小杨课程出勤率严重不足，多门学科成绩不合格、面临挂科，存在明显的情绪低落、行为懈怠、人际适应不良等问题，由辅导员引荐至心理辅导室接受专业干预。'},  {num:30, themes:['人际关系','家庭问题','情绪问题','完美主义','躯体化'], content:'一般资料：小琳，女，15岁，初三学生，第二次辅导。\n基本信息：小琳七岁时父母离异，此后跟随母亲生活。母亲独自抚养她压力较大，常向她倾诉生活不易，并反复表达“为了你牺牲很多”，使小琳长期背负愧疚感和情感压力。三个月前，小琳遭遇同伴关系创伤。相处多年的好友私下议论她“太黏人”，并把她倾诉过的家庭情况当作玩笑传播。小琳尝试沟通，却被对方指责敏感，随后又遭到部分同学疏远和孤立。小琳想向母亲倾诉，但母亲常以“不要把心思放在人际关系上”打断她。近半个月，小琳情绪持续低落，出现失眠、食欲下降和轻微自伤行为。母亲察觉异常后陪同她来到学校心理辅导室。'},  {num:31, themes:['学业压力','家庭问题','情绪问题'], content:'一般资料：小明，男，11岁，五年级学生，第一次辅导。\n基本信息：小明成绩中等，父母平时工作很忙。一个半月前，小明放学路上亲眼看见了一只流浪猫被车撞死。猫在地上抽搐了几下就不动了，周围有人把猫扔进了垃圾桶。那天晚上小明开始做噩梦，梦到那只猫的眼睛盯着他。他不敢一个人睡，也不敢关灯。之后他反复想起那个画面，上课走神，吃饭没胃口，出门总担心有车冲过来。他不敢跟父母说，因为以前他跟父母说害怕的事，父母总说“男孩子胆子这么小怎么行”。班主任注意到小明最近总是脸色发白、注意力不集中，找他谈话时小明小声说：“我觉得什么东西都会突然死掉。”班主任随后带他去了学校心理辅导室。'},  {num:32, themes:['学业压力','人际关系','家庭问题','情绪问题','恋爱情感'], content:'一般资料：小阳，女，12岁，六年级学生，第一次辅导。\n基本信息：小阳活泼开朗、与同学相处融洽，学习成绩中等。近期，班级里流传起一则谣言，说她暗恋班上一名男生，还写了情书。实际上小阳只是和那个男生分到同一小组做作业，多说了几句话。但谣言越传越真，有人起哄，有人嘲笑她“不害臊”。小阳试图解释，但没人听。从此以后，她在课堂上变得沉默寡言、走神发呆，有一次因为没听到老师提问被批评后，情绪更加低落。在课间休息的时候，不再与同学玩耍，拒绝同学邀请，对同学们的议论格外敏感、觉得十分烦躁。回家后，小阳常把自己关在房间，常因为一点小事对父母发脾气。小阳的作业完成质量大幅下降，经常出错，甚至多次都没有完成。班主任发现后，曾帮她在班上澄清，但对小阳的作用不大，因此建议她到辅导室寻求帮助。'},  {num:33, themes:['学业压力','人际关系','家庭问题','自我认同','情绪问题'], content:'一般资料：小川，男，20岁，大二学生，第二次咨询。\n基本信息：小川自幼成长于高压家庭环境，父母对其要求严苛，遇事多批评指责、极少包容沟通，导致他性格谨慎敏感，极度畏惧人际争执与矛盾，习惯压抑自身情绪、被动回避冲突。三个月前，小川因小组作业分工问题与宿舍室友产生分歧，双方沟通态度消极，彼此心存芥蒂，没有坦诚交流化解分歧，寝室关系由此变得疏离冷淡。最近他偶然在寝室门口听到室友私下评价自己性格内向、不善沟通、难以相处，觉得自己不被宿舍群体接纳。自此，小川愈发逃避寝室环境，总是等到寝室熄灯前才匆匆返回。长期的人际疏离与情绪压抑，让他内心孤独感持续叠加，时常陷入自我否定、过度思虑的状态，出现睡眠浅、多梦、情绪低落、心态浮躁等问题，上课注意力难以集中，学习效率、课业成绩均出现明显下滑。为改善当前糟糕的情绪状态与人际困境，主动到校心理辅导室寻求帮助。第一次咨询来访者表示希望通过心理辅导疏导负面情绪，调整偏差认知，学会合理处理宿舍人际矛盾，缓解心理困扰，恢复良好的学习生活状态。'},  {num:34, themes:['学业压力','人际关系','情绪问题','生涯迷茫'], content:'一般资料：小睿，女，16岁，高一学生，第三次心理咨询。\n基本信息：16岁的小睿思维灵活、学习踏实，学业成绩常年稳定在班级前茅，是老师重点关注、同学眼中的优等生。同班同学a长期对小睿的优异表现心生嫉妒。每次校内测验成绩公布后，a都会在班级当众讥讽，甚至因为a人缘好拉拢了一帮小群体连带着都对其阴阳怪气。小睿每每听到此类言论，都会心生不悦、倍感憋屈，但性格内向、不善争辩的她，始终选择默默忍受，没有当众澄清辩解。久而久之，a的恶意言论愈发过分、带有恶意揣测，不实传言迅速在班级间蔓延。小睿内心充满无助与疲惫，主观上觉得自己的解释苍白无力，不会得到他人信任，便不再试图辩驳、默默承受非议。长期的校园流言和人际偏见，让小睿对校园环境产生强烈的排斥感，在校期间持续处于精神紧张、心神不宁的状态，夜间睡眠紊乱、频繁失眠焦虑，逐渐产生害怕上学、抗拒校园的心理，负面情绪长期积压、无法自行疏导调节。后续在家长耐心开导与班主任专业劝导下，主动来到心理辅导室寻求专业帮助。'},  {num:35, themes:['学业压力','家庭问题','情绪问题','完美主义','躯体化'], content:'一般资料：小航，男，13岁，初一学生，第二次辅导。\n基本信息：小航凭借小升初优异成绩考入重点初中实验班，入学后首次综合测评成绩大幅下滑，跌至班级后段。自此他出现明显的躯体化小动作，做题时反复涂改字迹、反复擦拭卷面，日常生活反复洗手。一次课堂小测中，小航因粗心失误丢失分数，当场情绪崩溃，用文具划伤手指。任课老师发现其自伤行为与极端情绪后，第一时间上报班主任，在班主任初步沟通评估后，陪同小航前来进行心理辅导。在第一次咨询中了解到小航的父亲常年处于高压焦虑状态，工作不顺时经常在家抱怨“生活压力太大”“活着毫无意义”。长期以来，小航习惯性察觉并迁就父亲的负面情绪，事事小心翼翼，极度害怕自己的失误引发家人不满，始终背负着不让家人失望的心理压力。此次测评失利后，父亲虽未直接指责批评，但连日情绪低落、沉默寡言、频繁叹气，让小航陷入强烈的自我内耗，坚定认为是自己不够优秀，加重了家庭的负面氛围。'},  {num:36, themes:['人际关系','情绪问题','生涯迷茫'], content:'一般资料：小方，女，15岁，高一学生，第一次辅导。\n基本信息：小方原本和三位同窗好友关系十分要好，日常形影不离、无话不谈。新学期学校开启社团招募，好友们全部顺利入选热门兴趣社团，唯独小诺因综合素质测评微弱差距落选。自此，好友们拥有了专属的社团活动、共同的交际圈子和新鲜话题，课余时间大多结伴参与社团活动，很少再顾及小方。众人课间聊天时，话题全是社团趣事、团队活动，小方完全插不上话，只能默默坐在一旁；班级分组、课余结伴玩耍时，大家也会下意识忘记她，她常常落单独处。好几次好友相约聚餐、课后刷题，都唯独遗漏了她，即便偶尔参与集体活动，她也始终处于边缘位置，无人主动搭话、关注她的情绪。这些事情让小方脑海中“我是多余的”的想法不断固化、反复强化。因此她性格愈发沉默孤僻，习惯性独处避世，不愿主动与人沟通交往，对曾经感兴趣的课余活动、日常学习彻底失去热情，整日情绪低落、意志消沉，缺乏生活动力。在老师的陪同下前来心理室接受专业疏导。'},  {num:37, themes:['学业压力','家庭问题','情绪问题','躯体化'], content:'一般资料：小悦，女，16 岁，高一学生，第一次辅导。\n基本信息：小悦从小和爷爷奶奶在老家生活，上初中后被父母接到城里，但因为家里有个弟弟需要照顾，父母顾不上她，把她安排在寄宿学校。平时很少主动联系她，偶尔打电话也是问弟弟的情况。一次语文课上，老师让小悦朗读课文。她因为紧张读错了一个字，老师当着全班的面大声说：“这么简单的字都能读错，你到底有没有在听课？脑子带了没有？”全班哄笑。小悦脸涨得通红，低下头不敢说话。从那以后，小悦一上语文课就紧张，手抖、心跳加速，生怕被点名。她开始找各种理由逃课，成绩也往下掉。但她不敢跟父母说，因为说了也没人在意。她越来越不想待在学校，也不想回那个没人关心她的家。她不知道该找谁，于是主动来到学校心理辅导室寻求帮助。'},  {num:38, themes:['学业压力','人际关系','自我认同','情绪问题','网络成瘾','躯体化'], content:'一般资料：小琛，男，14岁，初二学生，第二次辅导。\n基本信息：小琛小学阶段成绩优异，长期被家长和老师视为“聪明、有天赋”的学生。升入初二后，学科难度增加，他开始感到吃力，但难以接受自己需要通过更多努力才能保持优势。近三个月，学校进入中考前置复习阶段，小琛为维持成绩长期熬夜学习，睡眠严重不足，但考试成绩仍低于预期。\n成绩落差使他出现明显焦虑和自我怀疑，并伴有头痛、腹胀、疲乏等躯体不适，医院检查未见明显器质性问题。一个月前，他在课堂测验中因多道题不会作答而当众落泪，之后受到同学议论，从此明显回避上学。近期他常闭门独处，沉迷短视频，作息颠倒，并多次搜索“考不上高中怎么办”“努力没用活着有什么意义”等内容。本次为第二次接受心理辅导。'},  {num:39, themes:['人际关系','家庭问题','情绪问题'], content:'一般资料：小宇，男，20岁，大二学生，第三次咨询。\n基本信息：小宇入学后表现出明显的仪式化和刻板化行为，已影响日常生活和宿舍关系。每天起床后，他必须反复整理床铺、抚平被面、对齐物品，整个过程约四十分钟。每次离开宿舍前，他都会反复检查门窗、电源和抽屉，即使已经下楼，也常因不安返回确认。宿舍物品需要固定摆放，若位置改变，他会明显焦虑烦躁。前两次咨询了解到，小宇成长于要求严格、强调完美和秩序的家庭环境。11岁时家庭突发变故，亲人长期分居，生活环境频繁变化，使他形成较强的不安全感和失控感。此后，他通过整理物品、反复检查获得短暂掌控感。近期室友因难以适应他的行为而逐渐疏远他，宿舍关系紧张。小宇希望通过咨询缓解焦虑，调整行为模式，改善人际适应。'},  {num:40, themes:['人际关系','情绪问题','生涯迷茫'], content:'一般资料：小语，女，20岁，大二学生，第一次咨询。\n基本信息：近两个月以来，小语发现自身情绪状态完全失控，情绪波动极大且毫无规律、无明确诱因，心境时常在愉悦、低落、烦躁、愤怒之间反复切换，自身完全无法调控。日常生活中，一些微不足道的小事，都会让她瞬间滋生烦躁、愤怒情绪，莫名想要发脾气、宣泄负面情绪。事后她能够清晰意识到自己情绪过激、行为不妥，深知没必要为小事动怒，却始终无法控制自身情绪反应。情绪的反复失控，让她的人际交往出现严重问题。以往相处融洽的朋友，逐渐无法适应她多变的情绪状态，纷纷表示她性格变化极大、难以相处，慢慢减少了与她的沟通和往来，她与身边亲友的距离越来越远，社交圈逐渐收缩。除此之外，多次情绪爆发后，小语内心产生了严重的自我担忧，偶尔情绪极度烦躁时，会产生冲动想法，担心自己无法克制冲动、做出伤害身边人的行为，滋生了自我恐惧与内耗。长期的情绪内耗、社交疏离、自我怀疑，让她内心备受煎熬，无法自行调节情绪状态，为改善自身情绪问题、修复人际关系、消除内心顾虑，她主动前来心理辅导室寻求专业帮助。'},  {num:41, themes:['人际关系','情绪问题'], content:'一般资料：安安，女，16岁，初三学生，首次辅导，主动来访。\n基本信息：安安性格内向，不擅长人际交往，在校朋友较少，最亲近的朋友是同班同学欣欣。欣欣性格活泼，人缘较好，社交圈广。安安将这段友谊视为重要的情感寄托，投入大量时间和情绪，但长期感到双方关系并不对等：自己十分在意欣欣，而欣欣常忽略她的感受。欣欣的冷淡、疏忽或与他人亲近，都会使安安陷入失落和自我怀疑。她逐渐认为自己不重要、不值得被真心对待。近段时间，安安频繁出现消极轻生念头，并担心自己会在情绪冲动时做出极端行为。她感到持续痛苦、难以自我调节，因此主动来到学校心理辅导室寻求帮助。'},  {num:42, themes:['学业压力','人际关系','情绪问题','完美主义'], content:'一般资料：小林，女，14岁，初二学生，第一次咨询。\n基本信息：小林是学校舞蹈队主力，擅长古典舞和现代舞，曾多次代表学校参加演出和比赛，平时性格开朗、自信。近一段时间，队内一名高年级同学因竞争关系对她产生不满，排练时故意抢占场地、打乱节奏，并在队员中散播关于她的不实言论。近期，对方多次联合其他同学在排练后或放学途中对小林进行言语嘲讽、孤立排挤，偶尔还故意碰撞、拉扯她，并威胁她不要告诉老师和家长。小林担心影响自己在舞蹈队的名额和测评成绩，一直选择隐忍。长期压力下，她训练状态明显下降，注意力涣散，动作失误增多，情绪低落沉默。舞蹈老师发现异常后建议她到学校心理中心接受辅导。'},  {num:43, themes:['学业压力','家庭问题','生涯迷茫'], content:'一般资料：小莫，女，21岁，大三学生，第一次咨询。\n基本信息：小莫出生在农村家庭，家里还有两个弟弟。上了大学以后，小莫学习刻苦，拿了学校和国家奖学金，为家庭着想，学费生活费都是靠自己兼职挣的钱交的。小莫希望考上研究生，继续她的学业之路，但父母思想传统固化，极度不认可女生长期求学的选择，频繁通过电话劝说、施压，反复灌输“女生读书无用”的观念，执意要求她尽早终止学业、毕业就业、成家立业。小莫始终坚持自己的求学理想，不愿妥协退让，此举引发了父母的强烈不满，父母甚至放出狠话，若她执意考研，便与她断绝亲子关系、形同陌路。家人的不理解与强硬逼迫，让小莫陷入极大的心理痛苦与矛盾。她深知人生需要自己掌控，不愿屈从于家人的固有认知，但父母的言语与态度深深刺痛了她，让她陷入自我内耗。每次与父母沟通结束后，她都会持续低落难过数日。临近学业考核与考研备考关键期，她心烦意乱、入睡困难、睡眠质量极差，学习专注力大幅下降，备考状态严重受损，陷入两难抉择的困境，因此主动前来进行心理咨询。'},  {num:44, themes:['人际关系','家庭问题','恋爱情感'], content:'一般资料：小月，女，15岁，高一学生，第二次辅导。\n基本信息：小月是一名高一的走读学生，最近她经常和被公司解雇的父亲争吵。小月从小由母亲照顾。小月的父亲长期在外上班，很少在家里常住，但最近被公司裁员了，暂时没找到工作，居家待业。父亲在家的时间一长，家里的氛围变得越来越古怪，开始父亲嫌弃母亲只会在家做饭不会赚钱，后面就经常斥责小月不好好学习，责怪母亲在家没有教育好小月，小月的母亲常常沉默。久而久之，小月内心积压了大量负面情绪，既厌恶父亲的迁怒与打压，又失望于母亲的沉默不作为，逐渐拒绝与母亲沟通交流，刻意疏远家人。受家庭负面氛围影响，小月在校状态急剧变差，日常沉默寡言、性格孤僻，课堂上频繁走神、注意力不集中，课间独自静坐、回避社交。每日放学之后，她极度抵触回家，常常独自在校外徘徊、静坐发呆，拖延至深夜才不得已归家。同桌发现了她的异常，向心理老师反映之后，心理老师邀请小月到辅导室聊一聊。'},  {num:45, themes:['人际关系','家庭问题','恋爱情感','生涯迷茫','完美主义'], content:'一般资料：小宇，男，12岁，初一新生，第一次辅导。\n基本信息：小宇性格内向敏感、心思细腻，是家中独子，童年阶段在父母的精心照料下长大，家庭氛围和睦，从未经历过独处与冷落。在小学毕业前夕，父母因感情不和协议离婚，小宇跟随父亲生活。父亲为扛起家庭经济压力，接手了外地业务，日常忙于工作应酬，对他的陪伴和关心大幅减少。小宇表面能够理解父亲的难处，乖巧独立，内心却慢慢滋生孤独感和被抛弃的担忧。升入初中后，小宇开始校园寄宿生活，无法快速适应集体宿舍环境。他长期习惯独居安静的环境，宿舍同学的交谈声、走动声、熄灯后的细微动静，都会让他心神不宁、难以入眠，夜间睡眠浅、易惊醒，长期睡眠质量不佳。白天在校期间，他精神萎靡、注意力涣散，课堂听课效率大幅下降，学习状态持续走低。同时，看到身边同学时常有家长到校探望、日常频繁沟通联系，而自己父亲常年疏于陪伴，母亲重组家庭后极少主动联系自己，他内心愈发失落，始终担心父母离婚后会彻底失去双亲的关爱，强烈的落差感和不安情绪持续堆积。多重负面情绪的困扰，让他睡眠障碍不断加重，心境持续低落压抑，抵触宿舍生活和校园集体环境，对初中学习生活产生严重的排斥心理。长期的心理困扰无法自我调节，最终主动前往学校心理辅导室寻求专业帮助。'},  {num:46, themes:['学业压力','家庭问题','情绪问题','网络成瘾','生涯迷茫','躯体化'], content:'一般资料：知予，女，18 岁，高三舞蹈艺考生，第三次辅导。\n基本信息：知予作为舞蹈类艺术特长生，当下正同时备考舞蹈专业校考和文化课考试，长期处于高强度训练与学习状态，每日休息不足四小时。父亲一直不认可艺术发展道路，希望她放弃艺考、选择传统升学方向，并多次表示如果专业考试失利，就要求她复读后报考更“稳定”的专业。在一次舞蹈基本功模拟测评中，知予因紧张出现四肢发抖、动作失误，随后情绪失控，离开训练场并关闭手机，两天未与家人和老师联系。回家后，她变得沉默、精神萎靡，常说自己拖累家人，是家庭负担。回到练功房后，她训练投入明显下降，常独自待在角落，机械重复基础动作。舞蹈老师发现异常后联系其母亲，母亲陪同她前来咨询。'},  {num:47, themes:['家庭问题','情绪问题','生涯迷茫'], content:'一般资料：小星，女，14 岁，初二学生，首次辅导。\n基本信息：小星父母常年在外务工，她从小由外婆照顾，小学毕业后才开始与父母共同生活。父亲脾气急躁，对她的过失常采取严厉斥责甚至体罚；母亲控制欲较强，经常查看她的社交软件，限制外出、穿着、发型和兴趣活动。小星感到家庭缺乏理解和私人空间。升入初二后，小星开始频繁逃课，到校外娱乐场所放松。被家人发现后，她与父亲爆发冲突，并出现过激自伤行为。班主任反映，她近期课堂态度消极，常顶撞老师，曾撕毁练习卷，周记中多次表达想逃离家庭。一周前，她因与母亲争吵而离家出走，在外独自停留两晚后被民警送回。班主任了解情况后建议其接受心理辅导。'},  {num:48, themes:['人际关系','家庭问题','情绪问题','恋爱情感','完美主义','躯体化'], content:'一般信息：小苏，男，20岁，大二学生，第二次咨询。\n基本信息：小苏来自农村家庭，经济条件较困难。入学后，他长期利用课余时间兼职，在食堂帮工、周末做导购，尽力承担生活费并补贴部分学费。虽然自己生活节俭，但家里经常向他索要生活费，他多次压缩个人开支予以支持。一次宿舍聚餐时，小苏接到家中再次索要生活费的电话。由于近期经济压力较大，他首次委婉拒绝，却遭到父母指责，认为他自私、不懂感恩。此后，家人索要钱财更加频繁，母亲以家中困难进行情感施压，父亲则责备他不孝。小苏逐渐出现入睡困难、心慌、注意力下降、思维迟缓等症状，只要看到家人来电或消息就感到紧张、抵触和恐惧。在室友支持下，他主动预约学校心理咨询。'},  {num:49, themes:['学业压力','家庭问题','恋爱情感'], content:'一般信息：小琪，女，13岁，初一学生，第一次辅导。\n基本信息：小琪小学三年级时父母离异，此后随母亲生活，母女关系一直较亲密。升入初中后，她性格活泼，擅长文艺表演，较快融入班级。初一上学期，小琪与班里一名男生互有好感，课间常结伴相处。班主任发现后，担心影响学习与身心发展，多次找小琪谈话，并联系母亲到校沟通。母亲得知后反应强烈，要求小琪立即减少与该男生的来往。小琪认为自己没有影响学习，也不认同老师和母亲的处理方式，逐渐认为班主任在刻意针对自己、破坏她与母亲的关系。此后，她对班主任产生明显抵触，对其任教的英语课厌学，上课走神、拒绝配合，成绩下滑。母亲担忧其情绪和学习状态，劝说她前来接受心理辅导。'},  {num:50, themes:['家庭问题','情绪问题','恋爱情感','完美主义'], content:'一般资料：小琳，女，12岁，六年级学生，首次辅导。\n基本信息：小琳父母长期感情不和，近期正在协商离婚。两人为了财产和抚养权问题频繁争吵，但都不想要小琳。父亲说“孩子跟着妈天经地义”，母亲说“她是你女儿你凭什么不管”。小琳无意中听到这些对话后，开始觉得自己是多余的人。班主任发现小琳近期上课频繁走神，作业潦草敷衍，多次在课本角落写下“没人要我”。前天，小琳在体育课上突然情绪崩溃，冲进厕所反锁门哭泣。老师安抚时发现其手臂内侧有轻微抓痕。追问下，小琳承认压力大时会用力掐自己，“这样心里就不闷了”。在班主任的建议下，小琳主动前来辅导。'},  {num:51, themes:['人际关系','自我认同','情绪问题','恋爱情感'], content:'一般资料：小诺，女，11岁，五年级学生，第三次辅导，班主任推荐来访。\n基本信息：小诺左侧脸颊有一处天生的浅褐色色素沉淀胎记，平日里她十分在意自己的外貌。在校一次课间体育活动中，她与同班同学发生肢体碰撞争执，对方当众嘲讽她脸上的胎记，用难听的词汇调侃她的外貌，言语极具攻击性。争执过后，该同学不仅没有收敛，反而在班级内四处散播言论，歪曲事件经过，将责任全部推给小诺，还持续在背后带头调侃、取笑她的外貌缺陷。放学回家后，小诺内心极度自卑委屈，反复用毛巾用力揉搓面部胎记位置，胎记依旧没有任何变化。看着镜子里的自己，小诺彻底崩溃落泪，内心的自卑与挫败感达到顶峰。此次事件后，小诺变得极度敏感多疑，在班级中总下意识觉得身边同学在悄悄议论、注视自己的胎记，时刻处于紧张不安的状态。她开始害怕与人对视、刻意回避人际交往，主动疏远同学、拒绝集体活动，性格变得沉默寡言、封闭自我。班主任及时发现小诺的情绪与行为异常，察觉其存在明显的心理困扰，多次沟通疏导无效后，建议并陪同她接受持续性心理辅导。'},  {num:52, themes:['学业压力','人际关系','家庭问题','情绪问题','生涯迷茫','完美主义'], content:'一般资料：小航，男，12岁，初一学生，第一次辅导。\n基本信息：小航属于留守学生，自幼父母常年在外务工，长期跟随年迈的爷爷在乡镇生活，日常缺乏父母的陪伴与照料。凭借自身刻苦努力，小航凭借升学选拔考试的优异成绩，顺利进入县城重点初中就读。入学初期，家中唯一的依靠爷爷突发重病离世，让他遭受了巨大的精神打击。由于学校离家路途遥远，交通不便，小航只能选择住校，每月仅能返乡一次。独自适应全新的寄宿生活、陌生的校园环境，加之初中课程难度大幅提升、学习节奏加快，小航难以快速适配，学业跟不上班级进度，学习压力骤增。多重压力叠加下，小航内心充满孤独与无助，深切觉得自己无依无靠，再也没有亲人真心疼爱、牵挂自己。为排解内心的落寞，他结识了校内几名行为散漫的同龄同学，逐渐跟随他们混迹玩耍，日常打扮张扬花哨，还频繁以各类理由向父母索要高额零花钱，行为状态出现明显偏差。母亲察觉孩子的巨大变化后满心焦虑，十分担忧他的身心状态与成长发展，主动联系班主任，在老师的劝导与鼓励下，引导小航前往学校心理辅导室接受专业疏导。'},  {num:53, themes:['学业压力','人际关系','情绪问题','恋爱情感','生涯迷茫','完美主义'], content:'一般资料：小阳，男，16岁，高一学生，第二次辅导。\n基本信息：高一学生小阳学习成绩处于班级中上水平，性格安静内敛、不善言辞，为人真诚友善。因其性格单纯，平日里更喜欢和女生结伴相处、交流学习，久而久之被班级部分男生孤立排挤，融入不了同性社交圈子。两个月前，班级社交账号中恶意流传出篡改后的聊天截图，捏造小阳向心仪女生表白的虚假内容，在班级大范围传播，引发全班同学的调侃与非议。突如其来的舆论非议，让小阳遭受巨大的心理冲击，自此频繁夜间失眠、反复做噩梦，整日惶恐不安。他开始刻意回避同学社交、拒绝参与班级集体活动，对校园生活产生强烈的抵触与逃避心理。近一个月以来，负面情绪长期积压的他无法自我调节，情绪低落时会通过划伤手腕的方式宣泄压力，异常行为被室友及时发现并上报班主任。班主任耐心沟通疏导后，发现其心理困扰较重，推荐并陪同小阳前来心理辅导室接受专业辅导。'},  {num:54, themes:['人际关系','家庭问题','情绪问题'], content:'一般资料：一诺，女，12岁，六年级学生，第一次辅导。\n基本信息：一诺在小学五、六年级连续担任班级学习委员，工作认真负责、责任心极强，对待班级纪律和同学作业检查严谨细致，会如实向任课老师反馈班级纪律问题与同学作业情况。正因履职认真，她被部分同学刻意疏远，还被取贬义外号，长期遭到班级小团体的孤立和排挤。面对校园人际困扰，一诺多次主动向父母倾诉自己的委屈与烦恼，但父母并未重视其情绪状态，反而认为是她太过较真，让她专注学习即可。长期得不到家人的理解与支持，加之校园人际关系持续紧张，半年以来一诺心境持续低落、情绪极易烦躁易怒，对生活丧失愉悦感，时常产生消极想法。曾经热爱的阅读、绘画等课余爱好如今全然提不起兴趣，极度抵触和同学相处，内心被无助、绝望的情绪填满，无法自行调节状态，主动前往学校心理辅导室寻求帮助。'},  {num:55, themes:['自我认同','恋爱情感','生涯迷茫'], content:'一般资料：小琪，女，19岁，大一新生，第三次心理咨询。\n基本信息：小琪因先天因素走路姿势轻微异常，身体的细微缺陷让小琪长期陷入深深的自卑，极度在意他人眼光，始终觉得自己和别人不一样，内心敏感怯懦。进入大学后，小琪结识了一位性格开朗、三观契合的同校男生，相处过程中二人十分合拍，小琪也慢慢对男生产生了好感。后续男生主动向小琪表达心意、坦诚告白，但小琪因强烈的自卑心理，始终顾虑自己的身体缺陷，害怕对方介意、嫌弃自己，觉得自身不够优秀、配不上对方，最终忍痛拒绝了男生的告白。拒绝对方后，小琪陷入无尽的内耗与纠结，内心明明满心欢喜、十分珍视这段缘分，却因为自身怯懦错失感情。她终日陷入自我怀疑与深深的愧疚之中，反复纠结自己是否做出了错误的选择，在后悔与自我否定的情绪中反复拉扯、备受煎熬，无法走出心理困境，因此预约学校心理咨询寻求专业帮助。'},  {num:56, themes:['学业压力','家庭问题','情绪问题','完美主义'], content:'一般资料：小王，女，17岁，高二学生，第二次心理辅导。\n基本信息：小王原本生活在较稳定的家庭中。半年前，父亲因工作调动长期驻外，父母开始异地生活，沟通矛盾逐渐增多。此后，父母频繁在小王面前争吵、抱怨，并多次提到婚姻破裂和分居问题，使她长期处于紧张压抑的家庭氛围中。母亲因独自生活压力较大，经常向小王倾诉委屈，暗示自己是为了孩子才维持婚姻；但当小王试图安抚母亲或调和父母关系时，母亲又要求她不要介入、不要责怪父亲。小王在父母矛盾中感到被迫卷入，一方面心疼母亲，另一方面又对家庭争吵感到无力和焦虑。近期她注意力下降，学习效率降低，成绩下滑，并伴有食欲不佳、精神萎靡、情绪低落等表现。好友察觉异常后陪同她来到学校心理辅导室。首次来访时，小王状态低落，沉默少言，不愿主动倾诉。'},  {num:57, themes:['学业压力','家庭问题','情绪问题','生涯迷茫','躯体化'], content:'一般资料：小宇，男，19岁，大一学生，第二次辅导。\n基本信息：小宇来自普通工薪家庭，有一个成绩优异、已保送研究生的哥哥。父母一直以哥哥为榜样教育他，经常说：“你哥从小就特别自觉”“你要多向哥哥学习”。进入大学后，小宇所学专业课程难度明显增加，尤其是高等数学和专业基础课，让他感到十分吃力。第一次期中考试成绩仅处于班级中游，与自己高中时期名列前茅的经历形成巨大反差。他总担心自己表现不好会让父母失望，也觉得自己始终活在哥哥的光环之下。最近一段时间，他每天花很多时间学习，却总觉得效率不高。临近考试时容易紧张，出现心慌、手心出汗等情况，考试中甚至因为过度紧张漏看题目。与此同时，他逐渐减少了参加篮球社活动的次数，经常一个人待在宿舍发呆。辅导员发现其情绪低落、课堂参与度下降，建议其前来咨询。'},  {num:58, themes:['学业压力','情绪问题','恋爱情感','躯体化'], content:'一般资料：小花，女，15岁，初二学生，第一次辅导。\n基本信息：小花有一个从小玩到大的闺蜜小敏。小敏性格敏感，经常因为各种小事情绪低落，每次都要小花陪着聊天、安慰很久才能好起来。小花一直都尽力陪着她。但最近半年，小敏的情绪问题越来越严重，几乎每天都会找小花哭诉，有时候半夜也发消息说“活着没意思”。小花每次看到消息就心慌，但又不敢不回，怕小敏真的出事。她开始失眠，上课也总在想小敏的事，成绩往下掉。小花试着跟小敏说过“我也有自己的事要忙”，小敏当场就哭了，说“你是我唯一能说的人，连你也不要我了吗”。小花再也不敢说出口了。她觉得自己被困住了，不敢拒绝，又承受不住。最近她经常一个人发呆，情绪低落，不知道该怎么办，于是主动来找老师寻求帮助。'},  {num:59, themes:['人际关系','家庭问题','情绪问题'], content:'一般资料：小月，19岁，女，高一学生，第二次辅导。\n基本信息：父母离异后，小月跟随母亲生活。母亲再婚后将重心放在了新家庭，对小月的生活较少过问。继父对小月态度冷漠，偶尔开口也是冷嘲热讽。她渐渐觉得，自己在这个世界上是多余的。进入大学后，小月极度渴望在宿舍关系中获得归属感，但由于过于敏感，室友们无意间的玩笑常被她解读为排挤。某次周末，室友们结伴外出聚餐没有叫正在睡觉的她，小月感到被彻底抛弃，联想到继父曾嘲讽她“你亲爹都不要你”，情绪崩溃。当晚她在朋友圈发布了一条全黑的图片，配文“如果能彻底消失就好了”。第二天早上她醒来删掉了朋友圈，但室友和辅导员已经看到并非常担忧。小月觉得大家现在看她的眼神都带着异样，有人同情她，也有人觉得她“情绪不稳定、太矫情”。小月现在在宿舍低着头不敢说话，辅导员了解情况后，带小月来找心理老师求助。'},  {num:60, themes:['学业压力','人际关系','家庭问题','自我认同','情绪问题','网络成瘾'], content:'一般资料：小包，女，11岁，五年级，第一次辅导。\n基本信息：小包家里经济条件差，父母平时忙着打工赚钱，对她的学习和生活很少过问。有一次，小包无意中听到班里几个女生的对话。她们在商量一个匿名投票，票选“班级里你最讨厌的人”。有人说“我投小包”，另一个说“我也投她，她真的好烦”。小包听到自己的名字，整个人都懵了。她一直觉得自己虽然不太爱说话，但也没得罪过谁。她不知道自己做错了什么，也不知道以后怎么面对班里的同学。她回家哭着跟父母说了这件事。母亲说：“同学之间搞着玩的，你太当真了。”父亲正在看手机，头都没抬在旁边接了一句：“你别整天想这些没用的，好好学习比什么都强。你要是成绩好，谁会讨厌你？”小包想再说点什么，但看父母都不在意的样子，把话咽了回去。那之后，小包不敢跟任何人说话，课间一个人坐着，上学路上也低着头。晚上她经常失眠，一遍遍地想为什么大家会讨厌她。这天，她终于熬不住了，来到心理辅导室，向心理老师求助。'},  {num:61, themes:['学业压力','人际关系','家庭问题','自我认同','情绪问题','恋爱情感','生涯迷茫','躯体化'], content:'一般资料：小杰，男，21岁，大三学生，第二次辅导。\n基本信息：小杰在大二时对同专业一名女生逐渐产生好感，但始终没有表达自己的感情。他认为自己长相普通、能力一般，不足以吸引对方，因此一直保持距离。平时他会频繁关注对方的朋友圈和社交动态，并不断揣测对方的想法。每当对方回复消息较慢，他就会反复猜测是不是自己说错了话。近几个月来，小杰发现自己越来越难以控制对这段关系的关注。学习时常常分心幻想两人的互动场景，睡眠质量下降，专业课成绩有所下滑。因焦虑引起的躯体化症状（心悸、胸闷）加剧，他主动预约了辅导。首次咨询中，他提到父母在其高中时期离异，之后一直与母亲生活，父亲联系较少。他感觉自己特别害怕被拒绝，也很在意别人是否喜欢自己。'},  {num:62, themes:['学业压力','人际关系','家庭问题','情绪问题','躯体化'], content:'一般资料：小悠，女，20岁，大二学生，第一次辅导。\n基本信息：小悠中学时曾是班级骨干，但高三时因一次国旗下演讲忘词被同学议论后，开始极度回避公开讲话。以优异成绩考入大学后，面对大学里频繁的小组汇报，她感到巨大的学业焦虑。为了确保汇报不出错，她经常熬夜修改PPT直到凌晨，要求所有排版绝对对齐，甚至连标点符号都要反复核对数遍。平时在图书馆自习时，若听到他人翻书或窃窃私语的声音，她会突然心烦意乱、手抖无法写字。大二以来症状加重，下课时她刻意最后一个离开教室，避免与同学在走廊同行。在食堂吃饭时必须找角落背对人群，否则会觉得大家都在注视和评价她，曾因周末三天未出宿舍、未与人交流被室友误认为“性格孤僻”。母亲是对她要求极高的教师，从小要求其“必须保持优秀”，父亲常年在外地工作，父女极少沟通。最近一段时间，小悠入睡困难，常在半夜惊醒，感到紧张与疲惫，担心自己无法达到理想标准。在辅导员的鼓励下来到心理辅导室。'},  {num:63, themes:['学业压力','人际关系','家庭问题','生涯迷茫'], content:'一般资料：小楠，18岁，大一新生，由辅导员转介，第一次辅导。\n基本信息：小楠来自偏远小镇，高中时成绩名列前茅，是老师和家长的骄傲。考入这所远离家乡的重点大学后，小楠面临诸多困扰。大学课程学习方式与高中差异较大，强调自主学习，小楠发现自己很难跟上专业课的进度，期中考试有一门核心课程不及格，这对她的打击极大。与此同时，小楠学习热情消退，开始逃避去图书馆。此外，宿舍同学兴趣爱好和成长背景差异较大，她感觉很难融入集体。小楠尝试参与对话，却常因接不上话而感到尴尬，逐渐感觉自己被边缘化，慢慢变得沉默寡言，独来独往。学校里优秀的人太多，小楠觉得自己再怎么努力也比不上别人，社团和学生会面试也因缺乏自信而落选，在大学里毫无存在感，也开始怀疑自己是否适合现在的专业和学校。小楠开始不愿接父母的电话，甚至在电话里对父母发脾气。辅导员多次谈心无果，将其转介给心理老师。'},  {num:64, themes:['人际关系','恋爱情感','网络成瘾'], content:'一般资料：淼淼，女，17岁，高二学生，第一次辅导。\n基本信息：淼淼性格内向，内心十分渴望拥有稳定的友谊。过去因为不善表达，曾被同学误认为“高冷”，这让她逐渐形成“别人不会喜欢我”的想法。升入高中后，她发现同学们其实愿意接近自己，但每当别人主动示好时，她又担心被拒绝或被误解，因此往往表现得冷淡或者刻意保持距离。时间久了，她发现自己的人际圈越来越小。虽然经常通过网络与人交流，但现实中的社交仍让她感到紧张和不自在。她意识到自己的交往方式可能存在问题，却不知道如何改变，因此主动预约咨询。'},  {num:65, themes:['家庭问题','生涯迷茫'], content:'一般资料：小悦，女，19岁，大一学生，第一次辅导\n基本信息：小悦从小热爱绘画，希望未来从事与艺术设计相关的工作。但父母认为艺术行业发展不稳定，希望她毕业后进入体制内或选择更“有前途”的职业方向。大学期间，小悦积极参加设计比赛和社团活动，却经常遭到父母质疑。每次与父母讨论未来规划时，双方都会发生争执。她觉得父母不理解自己的兴趣和梦想，而父母则认为她缺乏现实考虑。在持续冲突下，小悦开始对学习失去动力，与父母的关系也越来越紧张。她希望通过咨询理清自己的想法，并改善与父母的沟通。'},  {num:66, themes:['学业压力','人际关系','自我认同','情绪问题','恋爱情感','完美主义'], content:'一般资料：小明，男，21岁，大三学生，第一次接受心理咨询\n基本信息：小明大一、大二时生活平淡，成绩中等。大三上学期，他在选修课上遇到了一位心仪的女生，并展开了热烈的追求。可是这位女生外形出众，有非常多的追求者，小明面临巨大竞争，这让他感到非常焦虑。在一次表白中，女生委婉地拒绝了他，并随口说了一句“我比较喜欢那种个子很高、长得很帅的男生”。小明听了这句话后，陷入了严重的容貌焦虑和自卑中。他开始疯狂关注自己的外表，花费大量时间在健身房，甚至不惜借校园网贷购买昂贵的增肌粉、护肤品和名牌衣物。朋友们劝他理智一点，但他根本听不进去，近期甚至萌生了去整形医院做高风险医美项目的想法。由于将所有精力放在外貌改造和还贷压力上，他的学业受到严重影响，面临留级风险。在辅导员和好朋友的极力劝说和陪同下，他来到了心理咨询中心。'},  {num:67, themes:['人际关系','家庭问题','情绪问题'], content:'一般资料：小白，女，20岁，大二学生，第一次辅导。\n基本信息：小白是班级的团支书兼寝室长。为了维持班级和宿舍的纪律，她严格对待同学的任何“违规”行为，如晚自习缺勤、宿舍卫生不达标等，总是铁面无私地上报。前不久，班里同学在群里讨论一项集体活动的安排，小白认为大家偏离了主题，强行在群里开启了“全员禁言”，引发了同学们的集体愤怒和指责。事后，她明显感觉到自己遭到了全班同学的孤立，连室友也对她冷暴力。家庭中，父母长期分居且对她缺乏情感支持，她一直将全部自我价值寄托于“完美学生干部”的角色上。她觉得自己“像一把冰冷的尺子”，初衷明明是为了班级好，却落得如此下场。她不知道该怎么处理这种僵化的人际关系，感到十分苦恼、委屈和懊悔，甚至开始全盘否定自己，觉得自己一无是处、非常失败，整夜失眠，因此主动前来寻求心理老师的帮助。'},  {num:68, themes:['学业压力','人际关系','情绪问题','恋爱情感','网络成瘾','生涯迷茫'], content:'一般资料：小林，男，20岁，大三学生，第一次咨询。\n基本信息：小林高中阶段成绩较好，高考填报志愿时，在家人建议下选择了计算机专业。进入大学后，他一度觉得终于摆脱了高中时期的严格管理，开始把大量时间花在游戏和宿舍休闲上，课程学习投入不足，部分课程成绩不理想。随着年级升高，小林发现自己对编程和专业课程兴趣不高，也缺少清晰的职业规划。此前他一直认为自己就读于较好的大学，毕业后就业不会太困难，因此没有主动参加实习、竞赛或技能培训。直到近期投递实习岗位和参加面试时多次受挫，他才意识到自己在专业能力、项目经验和求职准备方面存在明显不足。最近，小林开始担心能否顺利毕业，也担心未来找不到合适的工作。想到就业、考研或转向其他方向时，他常觉得头脑混乱，不知道该从哪里开始。原本喜欢的游戏也逐渐失去吸引力，晚上入睡困难，食欲有所下降。他看着同学们参加比赛、考证、准备考研或实习，内心更加焦虑和自责，觉得自己“好像什么都不会，也不知道适合做什么”。小林意识到自己目前的状态影响了学习和生活，因此主动来到心理咨询室寻求帮助。'},  {num:69, themes:['人际关系','自我认同','情绪问题'], content:'一般资料：小悠，女，19岁，大一学生，第一次辅导。\n基本信息：小悠从小学习舞蹈，高中阶段曾因膝盖受伤减少训练。进入大学后，她加入了学校舞蹈社团，但在一次选拔中未能进入表演队。她将落选原因归结为自己的身材和外形不够好，从此开始过度关注体重和体型。近期，小悠经常反复照镜子、测量腰围和体重，并与社交媒体上的舞蹈博主进行比较。她开始减少正餐，刻意控制饮食，认为“瘦一点才有资格跳舞”。虽然身边同学提醒她已经不胖，但她仍觉得自己腿粗、体态不好，不愿意参加集体拍照和舞蹈排练。一段时间后，小悠出现注意力下降、上课容易疲惫、情绪低落等情况。她知道自己对体型的关注有些过度，但很难停止比较和自我否定。辅导员发现她近来状态不佳，建议她到心理咨询中心寻求帮助。'},  {num:70, themes:['学业压力','人际关系','家庭问题','情绪问题','生涯迷茫','躯体化'], content:'一般资料：小茗，大一学生，19岁，第一次辅导。\n基本信息：小茗父母离异后随母亲生活，母亲工作繁忙且十分要强，对小茗寄予厚望。为了不让母亲失望，小茗从小就强迫自己必须保持名列前茅。考入重点大学后，小茗发现周围同学都很优秀，尽管她非常努力，期中考试成绩也只排在班级中游，同宿舍的室友成绩更是远超于她。这让小茗产生了极大的危机感，她开始严重失眠，每天凌晨五点就起床背书，但课上却因过度疲惫而频频走神。在一次专业课的小测验中失误后，她情绪崩溃，躲在教学楼楼梯间痛哭，认为“大学考不好就拿不到奖学金，拿不到奖学金我的人生就彻底完了”。此后，她开始害怕面对考试，甚至在考前出现心慌、手抖的情况。在辅导员的建议下，她来到心理咨询室求助。'},  {num:71, themes:['人际关系','情绪问题','恋爱情感','完美主义'], content:'一般资料：小米，女生，20岁，大二学生，第一次辅导。\n基本信息：小米性格外向，平时与同学相处较好，也比较重视自己在同伴中的形象。进入大学后，她参加了多个校园活动，人际关系较活跃。近期，小米拒绝了一名男同学的追求。之后，对方在同学群和社交平台上发表一些含糊但带有贬低意味的话，引发部分同学猜测。虽然这些话并没有明确指名，但熟悉的人大多能看出是在影射小米。小米起初想不理会，但随着讨论范围扩大，她发现部分同学开始用异样眼光看她，也有原本关系不错的同学变得疏远。小米感到委屈、愤怒和无助。她尝试解释，但又担心越解释越被误解。最近她上课注意力下降，经常反复查看社交平台，担心别人又在议论自己。她不再像以前那样愿意参加集体活动，情绪低落，睡眠质量也受到影响。在辅导员建议下，小米来到心理咨询中心，希望能缓解当前压力，并学习如何面对同伴误解和社交舆论。'},  {num:72, themes:['学业压力','人际关系','家庭问题','自我认同','情绪问题','生涯迷茫','完美主义','躯体化'], content:'一般资料：东阳，男，20岁，大三学生，第二次咨询。\n基本资料：东阳家境困难，是村里走出来的第一个大学生，由年迈的爷爷靠务农抚养长大。进入大学后，东阳发现自己的英语口语和计算机基础远不如城里来的同学，眼界和见识的差距让他感到深深的自卑。他不敢参加社团，也很少主动与同学交流，总是独来独往。到了大三，面对即将到来的考研和就业压力，东阳感到前所未有的迷茫和焦虑。他想考研改变命运，但又担心考不上浪费钱；想直接工作，又觉得自己毫无竞争力。巨大的压力导致他长期失眠，并且养成了严重咬指甲的习惯，手指甲常被啃得坑坑洼洼。爷爷的教育观念传统严厉，东阳不敢将自己在学校的无助和挫败告诉爷爷，只能独自承受。近期他常感胸闷、头痛，觉得快要撑不下去了。'},  {num:73, themes:['学业压力','家庭问题','网络成瘾','生涯迷茫','完美主义'], content:'一般资料：小晨，男，19岁，大一学生，第二次辅导。\n基本信息：小晨的父亲对他要求极度严苛，从小到大都在规划他的人生。考上大学后，父亲依然没有放手，要求他每天汇报学习进度，并规定大一必须考进专业前十名以便将来保研。小晨原本以为上了大学就能喘口气，结果压力依然巨大。在第一学期的高数期中考试中，小晨发挥失常没有及格。父亲得知后在电话里严厉斥责他不求上进，并威胁要扣减他的生活费。小晨试图解释大学课程的难度，父亲却根本不听。从此，小晨对学习产生了强烈的抵触情绪，开始故意逃课、在宿舍通宵打游戏，看到父亲的来电就感到心烦意乱甚至害怕。亲子关系降至冰点，小晨的学习状态也一落千丈。辅导员发现他近期频繁旷课，与他谈心后将其转介给心理老师。'},  {num:74, themes:['人际关系','家庭问题','情绪问题','生涯迷茫'], content:'一般资料：小薇，女，19岁，大二学生，主动来访，首次咨询\n基本信息：小薇是家里的长女，也是家族里第一个考上重点大学的孩子。父母一直督促她要好好学习，并早早为她规划好了“考回老家当老师、帮衬家里”的路线。小薇每次参加校园文化活动或和室友外出聚餐，都不敢发朋友圈，因为一旦被父母知道她在“玩”，就会引来无休止的电话说教。母亲常说：“你是老大，弟弟妹妹以后上学还要靠你，我们老了也指望你。”父亲则强调她不能乱花钱。这让小薇背负了沉重的道德枷锁，每次放松娱乐都会产生强烈的负罪感。渐渐地，小薇不再参与任何集体活动，除了上课就是待在宿舍，与同学的关系越来越疏远。最近她时常莫名流泪、失眠，感觉整个人失去了活力，觉得未来的人生仿佛已经被锁死，毫无希望和乐趣。'},  {num:75, themes:['人际关系','家庭问题','情绪问题','躯体化'], content:'一般资料：小孔，女，18岁，大一学生，独生女，第一次辅导。\n基本信息：小孔父母常年在外地经商，很少陪伴她，母亲性格强势且控制欲强，导致小孔从小性格敏感、缺乏安全感。进入大学后，小孔非常渴望在宿舍建立亲密的关系，但由于生活习惯不同，她常显得有些格格不入。某次，同寝室的一位室友丢失了一支昂贵的口红，因为前一天小孔曾夸赞过那支口红的颜色，室友便在没有证据的情况下怀疑是小孔拿的。尽管小孔极力否认，但宿舍的其他两人也开始有意无意地孤立她，建了没有她的微信群，平时吃饭上课也不再叫她。小孔感到极度的委屈和愤怒，同时又伴随着深深的无力感。她现在每天回到宿舍就感到压抑、心慌，经常一个人躲在卫生间偷偷掉眼泪，强烈要求辅导员给她调换宿舍，情绪非常激动。'},  {num:76, themes:['人际关系','网络成瘾'], content:'一般资料：小书，女，20岁，大二学生，第一次咨询，主动来询。\n基本信息：小书性格温和、习惯讨好他人。她的一位室友作息很不规律，经常在深夜外放声音打游戏、频繁进出阳台大声打电话，严重影响了小书的休息。但小书一直不敢跟室友提出意见。大一时，小书曾因为值日问题与这位室友沟通过一次，结果对方态度强硬，两人发生了激烈的争吵。那次冲突后，室友对她冷嘲热讽了半个月，导致小书当时精神状态极差，甚至动过休学的念头。现在好不容易关系缓和，小书极度害怕重蹈覆辙，担心一旦开口维权就会再次引发冲突。这种“既愤怒又不敢表达”的无力感一直纠缠着她，导致她近期神经衰弱、入睡困难，白天上课也精神恍惚。为了改变这种内耗的状态，小书主动寻求心理帮助。'},  {num:77, themes:['学业压力','家庭问题','情绪问题','生涯迷茫'], content:'一般信息：小彭，男，21岁，大三学生，第二次辅导。\n基本信息：小彭目前正在紧张地备考研究生。他的父母都是名校毕业生、企业高管，对小彭的期望极高，不仅为他报了昂贵的考研辅导班，还经常周末开车来学校监督他复习。小彭深知父母用心良苦，学习非常刻苦。但在最近的几次模拟测试中，他的成绩距离目标院校的录取线仍有差距。每次把成绩告诉父母，父母虽然嘴上说“没关系继续努力”，但眉头紧锁、唉声叹气的神情让小彭感到窒息。小彭内心十分紧张焦虑，终于在某天父母再次询问复习进度时情绪失控，和父母大吵了一架，质问他们“是不是考不上研你们就不认我这个儿子了”。事后小彭感到自责，但内心深处对“父母到底爱的是我这个人，还是爱我优秀的成绩”产生了严重的怀疑。他带着这份困惑和备考的焦虑，主动寻求心理老师的帮助。'},  {num:78, themes:['学业压力','人际关系','恋爱情感'], content:'一般资料：小勇，男，14岁，初二学生，第一次辅导。\n基本资料：小勇性格内向腼腆，学习成绩较好，平时乐于帮助同学解决学习问题。同桌小美性格活泼，经常向他请教题目，两人相处比较自然，也会在课间分享零食、聊天。最近，班上有同学开始在两人说话时起哄，说他们“关系不一般”。小勇一开始感到尴尬，后来发现自己确实对小美有一些好感。但小美受到同学起哄影响，开始刻意减少和小勇说话，这让小勇感到失落和难过。与此同时，小勇上课时容易分心，学习成绩有所下降。老师发现他的状态变化后找他谈话，并调整了座位。小勇看到小美有意回避自己，更加不知所措，不知道该如何面对自己的情感和同学的议论，于是来到心理辅导室寻求帮助。'},  {num:79, themes:['学业压力','人际关系','家庭问题','自我认同','情绪问题','生涯迷茫','躯体化'], content:'一般资料：小宇，男，21岁，大三学生，第一次辅导。\n基本信息：小宇大学期间成绩一直处于班级中上游。目前正处于备考研究生的关键时期，随着考研日期的临近，他参加了几次辅导班的模拟考试，成绩波动较大，这让他极度焦虑。看到图书馆里周围同学都在拼命刷题且进度飞快，他深感自卑，极度担心自己考不上理想的大学，辜负父母一直以来的资金支持和期望。最近，他一想到考研或者翻开书本就心跳加速、胸闷出汗，学习时注意力完全无法集中，原本掌握的知识点也频繁出错。辅导员察觉到他近期精神状态极差，建议他过来寻求心理老师的帮助。'},  {num:80, themes:['人际关系','家庭问题','情绪问题','恋爱情感','网络成瘾'], content:'一般资料：小智，女，19岁，大一学生，第一次辅导。\n基本信息：小智的父母感情不和，常年冷战或争吵，母亲常把情绪发泄在小智身上，总说“要不是为了供你上大学，我早离婚了”。进入大学后，小智感到孤独，在现实中很少和同学交流，经常一个人在宿舍发呆。为了寻找情感寄托，她开始沉迷于某直播平台，不仅把大部分生活费用来给主播刷礼物以换取“关注”和“陪伴”，自己也频繁在深夜开直播与网友聊天，作息完全颠倒。国庆假期回家时，母亲发现了她的消费记录和熬夜直播的情况，大发雷霆并没收了她的设备，骂她“不务正业、丢人现眼”。小智崩溃大哭，大喊“你们根本没人在乎我”，随后提前返校，拉黑了父母的联系方式，整日待在宿舍不去上课。在辅导员的介入和劝说下，她勉强同意来找心理老师。'},  {num:81, themes:['人际关系','家庭问题','自我认同','情绪问题'], content:'一般资料：小志，男，20岁，大二学生，第一次咨询。\n基本信息：小志体型偏胖，性格比较软弱。大一以来，宿舍的几位室友常拿他的体型开玩笑，起初只是偶尔叫他“胖子”，后来演变成在宿舍群里发他的丑照做表情包，甚至在打扫卫生时故意把垃圾踢到他的床边。小志曾尝试向父母倾诉，但父母认为“男生之间开开玩笑很正常，你别太玻璃心，把心思放在学习上”。两周前，室友再次拿他的身材嘲笑他时，压抑已久的小志情绪失控，在宿舍大吼大叫并摔了水杯，警告他们不要再欺负人。事后，室友们虽然不再当面嘲笑他，但彻底将他当成了空气，集体孤立他。小志现在觉得待在宿舍如同坐牢，内心充满愤怒和委屈，甚至产生了强烈的厌学情绪，频繁旷课。辅导员了解情况后，带他来找心理老师求助。'},  {num:82, themes:['学业压力','人际关系','自我认同','情绪问题','躯体化'], content:'一般资料：小叶，男，大一学生，第二次咨询。\n基本信息：小叶大一入学后，与同宿舍同学小斌关系还可以，但随着逐渐熟悉，莫名奇妙出现对小斌的不满，发展到讨厌看到对方，讨厌听到对方的声音，并出现一些生理症状：头晕、失眠，注意力不集中等，自己无法解释前来咨询。第一次咨询时，咨询师了解到小叶与宿舍其他同学关系都还可以，只是对小斌特别讨厌，但与小斌之间并无发生任何冲突，心理测验提示有自卑心理。此次咨询后，小叶并未按约定继续咨询，而是跟辅导员申请调整宿舍，但宿舍调整后月1个月左右，小叶又莫名奇妙对新宿舍的另一同学产生厌恶情绪，无奈之下，继续前来心理辅导室寻求帮助。'},  {num:83, themes:['学业压力','人际关系','家庭问题','情绪问题'], content:'一般资料：小曲，女，初三学生，第一次辅导。\n基本信息：小曲跟 “重男轻女”的姥爷，爸爸、妈妈一起生活，而父母整天忙于做生意，很少有时间照顾她，对小颖学习比较看重。小曲认真学习，很少跟其他小朋友一起活动，成绩一直很好。因为小曲成绩好，经常得到老师的夸奖和同学的羡慕。升上初三后，任课老师为激励学生，经常对比上榜和落考学生的不同结局，小曲心底里有些不满老师们的说法，但也暗自对自己说绝对不能落后，最近一个月来，睡觉时经常做噩梦，梦到被一群狼狗追咬，又梦到自己在考场上舞弊被人发现，经常被吓醒，白天听课注意力有些不集中，晚上有些害怕睡觉，对此很焦虑，担心学习受影响，主动前来咨询。'},  {num:84, themes:['学业压力','人际关系','家庭问题'], content:'一般资料：小五，男，19岁，大一学生，第一次辅导。\n基本信息：小五的父母在他高考结束后办理了离婚手续，小五被判给父亲，但父亲很快组建了新家庭，对他关心甚少。进入大学后，看着同学们在节假日都有父母嘘寒问暖，小五内心感到极大的落差和孤独。某次班级信息登记时，有同学无意间看到了他的家庭情况，私下议论他“父母都不管他了”。小五得知后自尊心受挫，感到非常伤心和羞耻，上课也总是走神。他曾多次尝试联系母亲，渴望能得到一丝安慰和情感支持，但母亲总是以工作忙为由匆匆挂断电话。小五觉得自己是个“多余的人”，被世界抛弃了。在参加了学校的心理健康普测后，他鼓起勇气走进了心理辅导室。'},  {num:85, themes:['学业压力','人际关系','家庭问题','自我认同','生涯迷茫'], content:'一般资料：小燕，女，20岁，大二学生，第一次辅导。\n基本信息：小燕性格有些木讷，不善言辞，加上牙齿不太整齐，一直有些自卑。她内心非常渴望在大学里交到好朋友，当宿舍同学半开玩笑地叫她“牙套妹”时，小燕为了迎合大家，不仅没有生气，还主动拿自己的外貌自嘲，包揽了宿舍拿快递、打扫卫生等杂活。但她发现，尽管自己如此讨好，大家在分组做作业或周末聚餐时，依然很少主动叫她。最近一次专业课需要自由组队完成期末项目，小燕落单了，最后被老师硬塞进了一个小组。这件事彻底击垮了她，她开始害怕上需要互动的课程，认为自己毫无魅力、永远不会有人真心愿意和自己做朋友。久而久之，小燕变得非常消极，整天拉着床帘躺在床上，父母得知情况后非常担心，建议她寻求心理帮助。'},  {num:86, themes:['学业压力','人际关系','家庭问题'], content:'一般资料：小松，女，12岁，六年级，第一次辅导。\n基本信息：小松五年级下学期从外省转到现在的省会城市学校，之前一直跟随爷爷奶奶在农村老家上学，原本是爱笑、好动的女孩子，成绩也很不错，跟同学的相处也很融洽。但自从来到这个城市后，自觉班上的同学都比较有气质，见识也广，谈吐不凡，对比感到特别的自惭形秽，心态发生了很大的变化，无心学习，成绩下降很快，尤其是英语，上课听不懂的地方也不敢请教同学和老师，害怕与人交往，甚至产生了退学会老家的想法，与父母诉说后，因担心女儿的状况，带领前来寻求心理帮助。'},  {num:87, themes:['自我认同'], content:'一般资料：萌萌，女，19岁，大一学生，第一次辅导。\n基本信息：萌萌进入大学后，可能因为水土不服和作息不规律，脸上开始疯狂冒痘，这让她非常苦恼。课间休息或走在校园里，她总是下意识地低着头或用手遮挡脸颊，担心别人注意到她的皮肤。一次社团面试时，面试学姐无意间看了她几眼，萌萌就觉得对方一定是在嫌弃她的痘痘，紧张得语无伦次，最终落选。从那以后，她变得极度敏感，退出了所有社团，总是戴着口罩独来独往。每天早上起床，她做的第一件事就是照镜子，看到痘痘没有消下去，一整天的心情都很糟糕，连去食堂吃饭都觉得别人在盯着她看。萌萌觉得这种状态严重影响了她的正常大学生活，故来寻求心理老师帮助。'},  {num:88, themes:['人际关系','家庭问题','生涯迷茫'], content:'一般资料：阿泽，男，20岁，大二学生（体育特长生），第一次督导。\n基本信息：阿泽的父亲是一名退伍军人，对他要求极高，一直期望阿泽毕业后能考入特警队伍或应征入伍。阿泽也一直以此为目标，刻苦训练。然而，在上个月的一场重要篮球比赛中，阿泽意外受重伤，导致十字韧带断裂。医生告知他即使康复，也无法再承受高强度的体能训练。阿泽自知与梦想的职业无缘，父亲得知后虽未责骂，但难掩失望的神情。此后，阿泽慢慢变得心情郁闷，对曾经热爱的体育赛事完全丧失兴趣。他夜间辗转难眠，白天上课昏沉，近半个月来更是觉得自己是个“废人”，毫无价值。他觉得身边的同学都有光明的未来，而自己十几年的努力化为泡影，对未来感到彻底绝望。辅导员发现他近期状态极度消沉，劝他前来心理辅导。'},  {num:89, themes:['学业压力','家庭问题','情绪问题','生涯迷茫','躯体化'], content:'一般资料：小浩，19岁，大一学生，首次辅导。\n基本信息：小浩自幼被寄予厚望，父亲是某高校教授，对他要求极其严苛，要求他大学期间必须保持专业前三，以便将来申请顶尖名校的直博。进入大学后，面对高强度的理工科课程，小浩感到非常吃力，大一上学期期中考试成绩仅排在班级中游。父亲得知后在电话里对他进行了长达两小时的严厉训斥，并要求他取消所有周末休息时间。近一个月来，小浩处于极度紧绷的状态，一坐在书桌前就感到胸闷、喘不上气，脑海里总是控制不住地回放父亲训斥他的声音，导致他根本无法集中注意力，成绩进一步下滑。一周前，他在图书馆复习时突然情绪崩溃，在崩溃的情绪中，小浩第一次尝试用圆规在自己的手臂上划出血痕，伴随着尖锐的疼痛，小浩觉得自己“暂时的忘记了失败”。辅导员得知情况后联系家长，父亲却认为“他就是抗压能力太差，装可怜逃避学习”。小浩感到极度无助，觉得“我永远也达不到他的标准，我就是个彻头彻尾的失败者”。在辅导员的安抚和建议下，小浩同意寻求心理老师的帮助。'},  {num:90, themes:['人际关系','家庭问题','自我认同','情绪问题','生涯迷茫'], content:'一般资料：林舒，女，21岁，大四学生，第一次咨询。\n基本信息：林舒就读于一所普通高校的文科专业，临近毕业后开始参加校园招聘。起初她认为只要多投简历，总能找到合适的工作。但一个多月下来，她参加了几场宣讲会，投递了不少岗位，真正收到面试通知的却很少。第一次面试时，面试公司的无领导小组讨论中，她因为性格内向被强势的同学频频抢话，几乎没有发言机会，这让她很受打击。第二次面试中，面试官又对她的外貌、性格、家庭情况和婚恋计划提出一些与岗位关系不大的问题，林舒虽然觉得不舒服，但当时没有勇气表达，只能勉强回答。两次面试后，林舒开始回避求职信息。她一打开招聘软件就紧张，担心自己再次被否定。她觉得自己大学四年好像没有积累什么有价值的能力，也不知道自己到底适合什么工作。最近她睡眠变差，情绪低落，经常反复想“是不是我真的很差”。在辅导员建议下，林舒来到心理咨询中心，希望理清接下来的方向。'},  {num:91, themes:['人际关系','家庭问题','情绪问题','恋爱情感'], content:'一般资料：于婷，女，18岁，大一学生，第一次咨询。\n基本信息：于婷从小是个循规蹈矩的“乖乖女”，母亲家教极严，高中前严禁任何异性交往。进入大学后，看到周围同学陆续脱单，她内心也十分渴望恋爱。上学期，她在社团活动中认识了一位学长，互加微信后偶尔有交流，于婷对其暗生情愫。但学长的态度忽冷忽热，于婷每天花大量时间反复翻看对方的朋友圈和聊天记录，揣测对方的心意。她想主动表白，又怕被拒绝后连朋友都做不成；有时对方回消息快一点，她又觉得对方也是喜欢自己的。这种患得患失的矛盾心理让她备受折磨。最近，于婷发现自己上课根本无法集中注意力，情绪起伏极大，晚上经常失眠，干什么都提不起精神。她讨厌自己现在的状态，于是走进心理咨询中心寻求帮助。'},  {num:92, themes:['人际关系','自我认同','情绪问题','恋爱情感'], content:'一般资料：小玉，女，19岁，大一学生，第一次辅导。\n基本信息：小玉来自北方，身高1米76，骨架偏大。考入南方某高校后，她发现宿舍和班里的女同学大多娇小玲珑。在军训和体育课上，她总是因为身高被单独列出来当标兵，这让她觉得大家都在用异样的眼光盯着她。在一次班级联谊活动中，有男生半开玩笑地说她“像个保镖”，这句话深深刺痛了小玉。她对自己的身高和体型产生了强烈的羞耻感，觉得自己毫无女孩的柔美。为了让自己显得矮一点，她开始习惯性地含胸驼背，拒绝穿裙子，也从不参加任何需要抛头露面的集体活动。她觉得自己是个“异类”，常常在宿舍暗自流泪，因为过度在意他人的评价而陷入深深的自卑。'},  {num:93, themes:['学业压力','情绪问题','生涯迷茫','完美主义'], content:'一般资料：小陈，男，19岁，大一学生，第一次咨询。\n基本信息：陈越高考时没有被第一志愿专业录取，被调剂到目前的工科专业。刚入学时，他告诉自己“先学一段时间再说”，但经过一个多月的课程学习，他发现自己对专业基础课兴趣不高，也觉得学习内容和自己原本期待的大学生活差距很大。与此同时，他在网上看到不少关于该专业就业压力和行业发展变化的讨论，心里更加不安。学校即将开放转专业申请，陈越很想争取机会，但又担心自己的成绩不够突出。他还加入了学生组织，平时事务较多，复习时间被压缩，这让他更加焦虑。最近，陈越经常在晚上思考“要不要转专业”“如果转不成怎么办”“如果继续读下去会不会后悔”。有时他会想起高考失利时的挫败感，觉得自己又一次站在选择的岔路口。白天上课时，他容易走神，学习效率下降。陈越希望通过咨询梳理自己的想法，找到更清晰的行动方向。'},  {num:94, themes:['完美主义','躯体化'], content:'一般资料：二午，男，20岁，大二学生，第一次辅导。\n基本信息：二午是学院辩论队的核心辩手，逻辑严密、口才极佳。下周他将代表学院参加全校级别的辩论赛决赛。然而在备赛的关键期，二午突然感觉自己“大脑一片空白”，看资料完全看不进去，浑身乏力。队长和队友多次鼓励他，但他依然表示自己找不到状态。二午私下向辅导员坦言，这次决赛的对手是传统强队，自己之前在初赛和复赛中表现太好，把大家的期待值拉得太高。他极度害怕如果在决赛中被对方辩友驳倒，会让自己颜面扫地，也辜负了学院的期望。为了避免失败带来的羞耻感，他向队长提出了退赛申请。辅导员察觉到他的心理压力过大，将其带至心理辅导室。'},  {num:95, themes:['人际关系','家庭问题'], content:'一般资料：俊辉，男，19岁，大一学生，首次辅导。\n基本信息：俊辉成长于单亲家庭，母亲将全部心血倾注在他身上，控制欲极强。即便俊辉已经上大学，母亲依然要求他每天早中晚打三次视频电话汇报行踪，甚至私下添加了俊辉室友的微信，随时查岗。国庆假期前，俊辉和几个社团同学聚餐没能及时接听电话，母亲竟直接打给辅导员哭诉，称俊辉“学坏了”。这件事让俊辉在同学面前颜面尽失，他觉得母亲完全不尊重自己的隐私，让自己感到窒息。为了反抗，他开始故意不接电话，在宿舍里也变得像个火药桶，常因为一点小事就和室友发脾气。俊辉觉得非常痛苦，甚至产生了退学逃离母亲的念头，在室友的建议下来到咨询室。'},  {num:96, themes:['人际关系','家庭问题','恋爱情感','网络成瘾'], content:'一般资料：小新，男，14岁，初二学生，第一次辅导。\n基本信息：小新小时候主要由外婆照顾，在乡镇学校读书。进入初中后，他被父亲接到城市生活和学习。新学校节奏较快，同学之间原本就有固定朋友圈，小新一开始很难融入。加上他脸上青春痘较明显，担心被同学注意，因此很少主动与人交往。父亲觉得自己过去陪伴孩子太少，想通过满足小新的兴趣来拉近关系。发现小新喜欢打游戏后，父亲给他买了电脑和游戏设备。起初父子之间确实多了一些话题，但后来小新越来越依赖游戏。放学回家后，他常常先打开游戏，作业拖到很晚才写，周末也大部分时间待在房间里。父亲提醒他控制时间时，小新容易不耐烦，认为父亲“以前不管我，现在又什么都要管”。父子之间沟通越来越困难。父亲担心游戏影响学习和作息，也不知道该如何与孩子建立规则，于是带小新来到心理辅导室。'},  {num:97, themes:['学业压力','人际关系','自我认同','恋爱情感'], content:'一般资料：晓楠，女，20岁，大二学生，第二次辅导\n基本信息：晓楠外表看似大大咧咧，实则内心敏感多愁。大一上学期，她暗恋上了同班的一位男同学。为了能和对方多接触，她主动竞选了班委，但两人平时的交集仅限于收发通知。晓楠一直默默关注着男生的一举一动。最近，她发现该男生经常和另一个女生结伴去图书馆，两人有说有笑。这一幕让晓楠深受打击，她觉得自己不够漂亮、不够优秀，配不上对方。从此以后，她上课时总是忍不住盯着那个男生的背影发呆，完全听不进去老师在讲什么。原本成绩处于班级前列的她，期中考试成绩大幅下滑。晓楠觉得自己不仅失去了幻想中的爱情，连引以为傲的学习也搞砸了，陷入了严重的自我怀疑。'},  {num:98, themes:['人际关系','家庭问题','自我认同','情绪问题'], content:'一般资料：小然，女，16岁，高二学生，第一次辅导。\n基本信息：小然从小由姑姑照顾，父母长期在外务工，平时主要通过电话联系。进入高中后，她来到新的学校住宿。由于带有一些家乡口音，穿着也比较朴素，她一开始就觉得自己和同学不太一样。小然手臂上有一块明显胎记。一次体育课更衣时，有同学看到后随口议论了几句，还问她“这个是不是很奇怪”。虽然对方可能只是好奇，但小然感到非常难堪。从那以后，她开始尽量穿长袖，也避免参加需要换衣服或展示身体动作的活动。她越来越担心别人注意到自己的胎记，也把同学的疏远理解为“他们嫌弃我”。最近，小然在宿舍和班级中都变得沉默，不太主动参与聊天。她常觉得自己不受欢迎，也不愿把这些事告诉父母，担心他们觉得自己小题大做。班主任发现小然近期情绪低落、课堂参与减少，建议她到心理辅导室寻求帮助。'},  {num:99, themes:['学业压力','家庭问题','自我认同','情绪问题','恋爱情感'], content:'一般资料：小丽，女，22岁，大二学生，辅导员转介，首次心理咨询。\n基本资料：小丽成长于一个严厉的家庭，从小到大习惯了做顺从父母的“乖乖女”。大一下学期，她瞒着父母谈了一段恋爱，男友的温柔体贴让她第一次体验到被无条件接纳的幸福。然而恋爱半年后，男友以“性格不合”为由提出分手，小丽遭受了巨大的情感重创。极度痛苦中，她向母亲倾诉寻求安慰，母亲非但没有安抚，反而严厉指责她“不务正业、大学谈恋爱就是自找苦吃”。这成了压垮小丽的最后一根稻草。她陷入了极度的自我否定，觉得自己“样样不如人，根本不值得被爱”。近三周以来，小丽严重失眠，食欲减退，经常在宿舍无故落泪，完全无法准备即将到来的期末考试，辅导员担忧其心理状态，将其转介至心理咨询中心。'},  {num:100, themes:['学业压力','人际关系','家庭问题','情绪问题'], content:'一般资料：悦悦，女，13岁，初一学生，首次辅导。\n基本信息：悦悦家里有一个弟弟。她一直觉得父母更关注弟弟的需要，比如买学习用品、安排兴趣班、询问学习情况时，父母常常先想到弟弟。悦悦虽然没有明确向父母表达过不满，但心里常觉得自己被忽视。前不久，悦悦一次单元测验进步明显，兴奋地把成绩告诉父母。父母只是简单夸了一句，就继续辅导弟弟作业。悦悦感到很失落，觉得自己再努力也不会被真正看见。进入初中后，悦悦在人际交往中也变得敏感。小组活动时，如果同学没有主动邀请她，她就会觉得自己不受欢迎；同桌一句普通玩笑，她也容易理解成讽刺。最近，她因为一次小组分工问题和同桌发生争执，之后更不愿参加集体活动。班主任发现悦悦近期情绪波动较大，和同学关系有些紧张，于是建议她接受心理辅导。悦悦表示自己也想知道，为什么自己总是很在意别人是不是重视她。'},];

let currentTheme = 'all';
let currentSearch = '';
let showingRandom = false;

// Render all cases
function renderCases() {
  const list = document.getElementById('cases-list');
  let html = '';
  let count = 0;
  CASES.forEach(c => {
    const matchTheme = currentTheme === 'all' || c.themes.includes(currentTheme);
    const text = c.content.toLowerCase();
    const matchSearch = !currentSearch || text.includes(currentSearch.toLowerCase());
    if (matchTheme && matchSearch) {
      const themeHtml = c.themes.map(t => `<span class="case-theme-tag">${t}</span>`).join('');
      html += `<div class="case-card">
  <div class="case-header">
    <span class="case-num">案例 ${c.num}</span>
    <div class="case-themes">${themeHtml}</div>
  </div>
  <div class="case-content">${c.content.replace(/\n/g,'<br>')}</div>
</div>`;
      count++;
    }
  });
  list.innerHTML = html || '<div class="no-result">😔 没有找到匹配的案例</div>';
  document.getElementById('filter-count').textContent = count;
  document.getElementById('controls').classList.add('show');
  document.getElementById('cases-list').style.display = '';
  document.getElementById('random-display').classList.remove('show');
  document.getElementById('all-view').style.display = '';
  document.getElementById('btn-back').style.display = 'none';
  showingRandom = false;
}

// Random case
function randomCase() {
  const idx = Math.floor(Math.random() * CASES.length);
  const c = CASES[idx];
  const themeHtml = c.themes.map(t => `<span class="case-theme-tag">${t}</span>`).join('');
  const html = `<div class="random-card">
  <div class="case-num">案例 ${c.num}（随机抽取）</div>
  <div class="case-themes">${themeHtml}</div>
  <div class="case-content">${c.content.replace(/\n/g,'<br>')}</div>
  <div class="random-actions">
    <button class="btn btn-random" onclick="randomCase()">🎲 换一个</button>
    <button class="btn btn-back" onclick="showAll()">📋 查看全部案例</button>
  </div>
</div>`;
  document.getElementById('random-display').innerHTML = html;
  document.getElementById('random-display').classList.add('show');
  document.getElementById('all-view').style.display = 'none';
  document.getElementById('btn-back').style.display = '';
  showingRandom = true;
  window.scrollTo({top:0, behavior:'smooth'});
}

// Show all
function showAll() {
  document.getElementById('random-display').classList.remove('show');
  document.getElementById('all-view').style.display = '';
  document.getElementById('btn-back').style.display = 'none';
  showingRandom = false;
  renderCases();
  window.scrollTo({top:0, behavior:'smooth'});
}

// Filter
function filterCases() {
  if (showingRandom) return;
  renderCases();
}

document.getElementById('theme-tags').addEventListener('click', function(e) {
  if (e.target.classList.contains('theme-tag')) {
    document.querySelectorAll('.theme-tag').forEach(t => t.classList.remove('active'));
    e.target.classList.add('active');
    currentTheme = e.target.dataset.theme;
    filterCases();
  }
});

document.getElementById('search').addEventListener('input', function(e) {
  currentSearch = e.target.value;
  filterCases();
});

// Init
renderCases();

// Theme tags
const themeCount = {};
CASES.forEach(c => c.themes.forEach(t => { themeCount[t] = (themeCount[t]||0)+1; }));
let tagsHtml = `<span class="theme-tag active" data-theme="all">全部 (${CASES.length})</span>`;
Object.entries(themeCount).sort((a,b)=>b[1]-a[1]).forEach(([t,c]) => {
  tagsHtml += `<span class="theme-tag" data-theme="${t}">${t} (${c})</span>`;
});
document.getElementById('theme-tags').innerHTML = tagsHtml;
</script>
</body>
</html>
