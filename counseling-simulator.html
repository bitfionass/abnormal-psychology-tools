<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>变态心理学 · 模拟咨询训练系统</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --primary:#4f46e5;
  --primary-light:#818cf8;
  --primary-dark:#3730a3;
  --success:#10b981;
  --warning:#f59e0b;
  --danger:#ef4444;
  --gray-50:#f8fafc;
  --gray-100:#f1f5f9;
  --gray-200:#e2e8f0;
  --gray-300:#cbd5e1;
  --gray-400:#94a3b8;
  --gray-500:#64748b;
  --gray-600:#475569;
  --gray-700:#334155;
  --gray-800:#1e293b;
  --gray-900:#0f172a;
}
html{font-size:15px}
body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;background:var(--gray-100);color:var(--gray-800);height:100vh;overflow:hidden}

/* 布局 */
.app{display:flex;flex-direction:column;height:100vh}
.header{background:linear-gradient(135deg,var(--primary),var(--primary-dark));color:white;padding:12px 20px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.header h1{font-size:1.1em;font-weight:700}
.header-info{font-size:0.85em;opacity:0.9}
.main{display:flex;flex:1;overflow:hidden}

/* 左侧面板 */
.sidebar{width:320px;background:white;border-right:1px solid var(--gray-200);display:flex;flex-direction:column;flex-shrink:0}
.sidebar-header{padding:16px;border-bottom:1px solid var(--gray-200);background:var(--gray-50)}
.sidebar-header h2{font-size:1em;color:var(--gray-700);margin-bottom:4px}
.case-selector{width:100%;padding:8px 12px;border:1px solid var(--gray-300);border-radius:8px;font-size:0.9em;background:white}
.sidebar-content{flex:1;overflow-y:auto;padding:16px}
.info-section{margin-bottom:16px}
.info-title{font-size:0.8em;font-weight:600;color:var(--gray-500);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px}
.info-card{background:var(--gray-50);border-radius:10px;padding:12px;border:1px solid var(--gray-200)}
.info-row{display:flex;margin-bottom:6px;font-size:0.9em}
.info-label{color:var(--gray-500);width:60px;flex-shrink:0}
.info-value{color:var(--gray-800);font-weight:500}
.chief-complaint{background:linear-gradient(135deg,#fef3c7,#fde68a);border-radius:10px;padding:12px;border-left:4px solid var(--warning);font-style:italic;font-size:0.95em;line-height:1.6}

/* 操作按钮 */
.actions{padding:16px;border-top:1px solid var(--gray-200);display:flex;flex-direction:column;gap:8px}
.btn{padding:10px 16px;border-radius:10px;font-size:0.9em;font-weight:600;cursor:pointer;border:none;transition:all 0.2s}
.btn-primary{background:var(--primary);color:white}
.btn-primary:hover{background:var(--primary-dark)}
.btn-success{background:var(--success);color:white}
.btn-success:hover{background:#059669}
.btn-outline{background:white;color:var(--primary);border:2px solid var(--primary)}
.btn-outline:hover{background:var(--gray-50)}

/* 聊天区域 */
.chat-area{flex:1;display:flex;flex-direction:column;background:white}
.chat-header{padding:12px 20px;border-bottom:1px solid var(--gray-200);background:var(--gray-50);display:flex;align-items:center;justify-content:space-between}
.chat-title{font-size:0.95em;font-weight:600;color:var(--gray-700)}
.status-badge{padding:4px 12px;border-radius:20px;font-size:0.75em;font-weight:600}
.status-active{background:#d1fae5;color:#059669}
.status-ended{background:#fee2e2;color:#dc2626}
.chat-messages{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:16px}
.message{display:flex;gap:12px;max-width:85%}
.message.user{align-self:flex-end;flex-direction:row-reverse}
.message-avatar{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1em;flex-shrink:0}
.message-client .message-avatar{background:linear-gradient(135deg,#ec4899,#db2777)}
.message-user .message-avatar{background:linear-gradient(135deg,var(--primary),var(--primary-dark))}
.message-content{background:var(--gray-100);border-radius:12px;padding:12px 16px;font-size:0.95em;line-height:1.7}
.message-user .message-content{background:linear-gradient(135deg,var(--primary),var(--primary-dark));color:white}
.message-content p{margin-bottom:8px}
.message-content p:last-child{margin-bottom:0}
.message-time{font-size:0.7em;color:var(--gray-400);margin-top:4px}

/* 输入区域 */
.chat-input{padding:16px 20px;border-top:1px solid var(--gray-200);background:var(--gray-50)}
.input-row{display:flex;gap:12px}
.text-input{flex:1;padding:12px 16px;border:2px solid var(--gray-200);border-radius:12px;font-size:0.95em;outline:none;transition:border-color 0.2s}
.text-input:focus{border-color:var(--primary)}
.send-btn{padding:12px 24px;background:var(--primary);color:white;border:none;border-radius:12px;font-size:0.95em;font-weight:600;cursor:pointer;transition:all 0.2s}
.send-btn:hover{background:var(--primary-dark)}
.send-btn:disabled{background:var(--gray-300);cursor:not-allowed}

/* 诊断面板 */
.diagnosis-panel{display:none;width:360px;background:white;border-left:1px solid var(--gray-200);flex-direction:column;flex-shrink:0}
.diagnosis-panel.active{display:flex}
.diagnosis-header{padding:16px;border-bottom:1px solid var(--gray-200);background:var(--gray-50)}
.diagnosis-header h2{font-size:1em;color:var(--gray-700)}
.diagnosis-content{flex:1;overflow-y:auto;padding:16px}
.diagnosis-form{display:flex;flex-direction:column;gap:12px}
.form-group{display:flex;flex-direction:column;gap:6px}
.form-label{font-size:0.85em;font-weight:600;color:var(--gray-600)}
.form-select,.form-textarea{padding:10px 12px;border:2px solid var(--gray-200);border-radius:8px;font-size:0.9em;outline:none;transition:border-color 0.2s}
.form-select:focus,.form-textarea:focus{border-color:var(--primary)}
.form-textarea{min-height:100px;resize:vertical}
.diagnosis-actions{padding:16px;border-top:1px solid var(--gray-200);display:flex;gap:8px}

/* 评估报告 */
.report-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);z-index:100;align-items:center;justify-content:center}
.report-overlay.active{display:flex}
.report-modal{background:white;border-radius:20px;width:90%;max-width:700px;max-height:80vh;overflow-y:auto;box-shadow:0 25px 50px rgba(0,0,0,0.25)}
.report-header{padding:24px;border-bottom:1px solid var(--gray-200);display:flex;align-items:center;justify-content:space-between}
.report-header h2{font-size:1.3em;font-weight:700}
.close-btn{width:36px;height:36px;border-radius:50%;border:none;background:var(--gray-100);cursor:pointer;font-size:1.2em;display:flex;align-items:center;justify-content:center}
.report-body{padding:24px}
.report-section{margin-bottom:20px}
.report-section-title{font-size:0.9em;font-weight:600;color:var(--gray-500);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px}
.report-item{padding:12px;background:var(--gray-50);border-radius:10px;margin-bottom:8px;font-size:0.95em}
.report-score{display:flex;align-items:center;gap:12px;padding:16px;background:linear-gradient(135deg,#d1fae5,#a7f3d0);border-radius:12px;margin-top:16px}
.score-number{font-size:2em;font-weight:800;color:#059669}
.score-label{font-size:0.9em;color:#065f46}
.report-footer{padding:16px 24px;border-top:1px solid var(--gray-200);display:flex;justify-content:flex-end;gap:8px}

/* 学生信息弹窗 */
.student-overlay{position:fixed;inset:0;background:linear-gradient(135deg,rgba(79,70,229,.96),rgba(55,48,163,.96));z-index:200;display:none;align-items:center;justify-content:center;padding:24px}
.student-overlay.active{display:flex}
.student-card{width:min(92vw,460px);background:white;border-radius:24px;padding:32px;box-shadow:0 30px 80px rgba(15,23,42,.35)}
.student-card h2{font-size:1.45em;color:var(--gray-900);margin-bottom:8px}
.student-card p{color:var(--gray-500);line-height:1.7;margin-bottom:22px}
.student-fields{display:flex;flex-direction:column;gap:14px;margin-bottom:22px}
.student-field label{display:block;font-size:.88em;font-weight:700;color:var(--gray-700);margin-bottom:6px}
.student-field input{width:100%;padding:13px 14px;border:2px solid var(--gray-200);border-radius:12px;font-size:1em;outline:none;transition:border-color .2s}
.student-field input:focus{border-color:var(--primary)}
.student-hint{font-size:.82em;color:var(--gray-400);margin-top:10px;line-height:1.6}

@media(max-width:768px){
  .sidebar{display:none}
  .diagnosis-panel{position:fixed;top:0;right:0;bottom:0;z-index:50;box-shadow:-10px 0 30px rgba(0,0,0,0.1)}
}
</style>

      "焦虑|紧张|万一": "'如果不做那些仪式，就会特别焦虑，感觉要出大事。'"
    }
  }
};

let currentCase = "case1";
let currentData = cases[currentCase];
let isConsultationActive = true;
let questionCount = 0;
let collectedInfo = new Set();
let studentProfile = { name: '', classInfo: '' };

function startTraining() {
  const name = document.getElementById('studentName').value.trim();
  const classInfo = document.getElementById('studentClass').value.trim();
  if (!name) {
    alert('请先填写姓名');
    document.getElementById('studentName').focus();
    return;
  }
  studentProfile = { name, classInfo };
  document.getElementById('studentOverlay').classList.remove('active');
  document.querySelector('.header-info').textContent = `${name}${classInfo ? ' · ' + classInfo : ''}｜自主提问，收集信息，完成诊断`;
  document.getElementById('userInput').focus();
}

// 初始化
function init() {
  loadCase(currentCase);
  const desktopSelector = document.getElementById('caseSelector');
  const mobileSelector = document.getElementById('mobileCaseSelector');
  function handleCaseChange(value) {
    currentCase = value;
    currentData = cases[currentCase];
    loadCase(currentCase);
  }
  desktopSelector.addEventListener('change', function() { handleCaseChange(this.value); });
  mobileSelector.addEventListener('change', function() { handleCaseChange(this.value); });
}

// 加载案例
function loadCase(caseId) {
  const data = cases[caseId];
  currentData = data;
  questionCount = 0;
  collectedInfo.clear();
  isConsultationActive = true;
  document.getElementById('statusBadge').className = 'status-badge status-active';
  document.getElementById('statusBadge').textContent = '进行中';
  document.getElementById('caseSelector').value = caseId;
  document.getElementById('mobileCaseSelector').value = caseId;
  document.getElementById('mobileCaseTitle').textContent = `${data.name}｜${data.info.gender} · ${data.info.age} · ${data.info.occupation}`;
  document.getElementById('mobileChiefComplaint').textContent = data.complaint;
  document.getElementById('mobileQuestionCount').textContent = '0';
  document.getElementById('mobileInfoCollected').textContent = `0/${Object.keys(data.keywords).length}`;
  
  // 显示来访者信息
  const infoHtml = `
    <div class="info-section">
      <div class="info-title">基本信息</div>
      <div class="info-card">
        <div class="info-row"><span class="info-label">姓名</span><span class="info-value">${data.name}</span></div>
        <div class="info-row"><span class="info-label">性别</span><span class="info-value">${data.info.gender}</span></div>
        <div class="info-row"><span class="info-label">年龄</span><span class="info-value">${data.info.age}</span></div>
        <div class="info-row"><span class="info-label">职业</span><span class="info-value">${data.info.occupation}</span></div>
        <div class="info-row"><span class="info-label">婚姻</span><span class="info-value">${data.info.marital}</span></div>
      </div>
    </div>
    <div class="info-section">
      <div class="info-title">主诉</div>
      <div class="chief-complaint">${data.complaint}</div>
    </div>
    <div class="info-section">
      <div class="info-title">咨询进度</div>
      <div class="info-card">
        <div class="info-row"><span class="info-label">提问数</span><span class="info-value" id="questionCount">0</span></div>
        <div class="info-row"><span class="info-label">收集信息</span><span class="info-value" id="infoCollected">0/8</span></div>
      </div>
    </div>
  `;
  document.getElementById('caseInfo').innerHTML = infoHtml;
  
  // 初始化对话
  const chatHtml = `
    <div class="message message-client">
      <div class="message-avatar">👩</div>
      <div class="message-content">
        <p>你好，我是${data.name}。</p>
        <p>${data.complaint}</p>
      </div>
    </div>
  `;
  document.getElementById('chatMessages').innerHTML = chatHtml;
  
  // 重置诊断表单
  document.getElementById('primaryDiagnosis').value = '';
  document.getElementById('diagnosisBasis').value = '';
  document.getElementById('differentialDiagnosis').value = '';
  document.getElementById('treatmentPlan').value = '';
  document.getElementById('riskLevel').value = '';
}


// 发送消息
function sendMessage() {
  if (!isConsultationActive) return;
  
  const input = document.getElementById('userInput');
  const message = input.value.trim();
  if (!message) return;
  
  questionCount++;
  document.getElementById('questionCount').textContent = questionCount;
  document.getElementById('mobileQuestionCount').textContent = questionCount;
  
  // 添加用户消息
  addMessage(message, 'user');
  input.value = '';
  
  // 生成回复
  setTimeout(() => {
    const response = generateResponse(message);
    addMessage(response, 'client');
    updateProgress();
  }, 500);
}

// 添加消息
function addMessage(content, type) {
  const messagesDiv = document.getElementById('chatMessages');
  const avatar = type === 'user' ? '👨‍⚕️' : '👩';
  const messageClass = type === 'user' ? 'message-user' : 'message-client';
  
  const html = `
    <div class="message ${messageClass}">
      <div class="message-avatar">${avatar}</div>
      <div class="message-content">${content}</div>
    </div>
  `;
  messagesDiv.innerHTML += html;
  messagesDiv.scrollTop = messagesDiv.scrollHeight;
}

// 生成回复
function generateResponse(question) {
  const q = question.toLowerCase();
  const keywords = currentData.keywords;
  
  for (const [pattern, response] of Object.entries(keywords)) {
    const patterns = pattern.split('|');
    if (patterns.some(p => q.includes(p))) {
      // 记录收集到的信息
      const category = patterns[0];
      collectedInfo.add(category);
      return `<p>${response}</p>`;
    }
  }
  
  // 默认回复
  const defaultResponses = [
    "（沉默了一会儿）嗯...你能再说详细一点吗？",
    "我不太明白你的意思，你能换个方式问吗？",
    "（低头）这个问题...我不太想回答。",
    "（思考）让我想想...",
    "你是想问哪方面呢？"
  ];
  return `<p>${defaultResponses[Math.floor(Math.random() * defaultResponses.length)]}</p>`;
}

// 更新进度
function updateProgress() {
  const total = Object.keys(currentData.keywords).length;
  const collected = collectedInfo.size;
  document.getElementById('infoCollected').textContent = `${collected}/${total}`;
  document.getElementById('mobileInfoCollected').textContent = `${collected}/${total}`;
}

// 结束咨询
function endConsultation() {
  isConsultationActive = false;
  document.getElementById('statusBadge').className = 'status-badge status-ended';
  document.getElementById('statusBadge').textContent = '已结束';
  document.getElementById('sendBtn').disabled = true;
  
  addMessage('<p>咨询时间到了。感谢你的信任，我们会根据今天的情况给你一些建议。</p>', 'user');
}

// 显示诊断面板
function showDiagnosis() {
  document.getElementById('diagnosisPanel').classList.add('active');
}

// 隐藏诊断面板
function hideDiagnosis() {
  document.getElementById('diagnosisPanel').classList.remove('active');
}

// 提交诊断
function submitDiagnosis() {
  const diagnosis = document.getElementById('primaryDiagnosis').value;
  const basis = document.getElementById('diagnosisBasis').value;
  const differential = document.getElementById('differentialDiagnosis').value;
  const treatment = document.getElementById('treatmentPlan').value;
  const risk = document.getElementById('riskLevel').value;
  
  if (!diagnosis) {
    alert('请选择主要诊断');
    return;
  }
  
  // 计算得分
  let score = 0;
  const correctDiagnosis = currentData.diagnosis;
  const diagnosisMap = {
    'depression': '重性抑郁障碍',
    'gad': '广泛性焦虑障碍',
    'social_anxiety': '社交焦虑障碍',
    'panic': '惊恐障碍',
    'ptsd': '创伤后应激障碍',
    'ocd': '强迫症',
    'bpd': '边缘型人格障碍',
    'adhd': '注意缺陷/多动障碍',
    'anorexia': '神经性厌食'
  };
  
  const selectedDiagnosis = diagnosisMap[diagnosis] || diagnosis;
  const isCorrect = correctDiagnosis.includes(selectedDiagnosis) || selectedDiagnosis.includes(correctDiagnosis);
  
  if (isCorrect) score += 40;
  if (basis.length > 50) score += 20;
  if (differential.length > 30) score += 20;
  if (treatment.length > 30) score += 10;
  if (risk) score += 10;
  
  // 生成报告
  showReport(selectedDiagnosis, isCorrect, score, basis, differential, treatment, risk);
}

// 显示报告
function showReport(diagnosis, isCorrect, score, basis, differential, treatment, risk) {
  const riskLabels = { low: '低风险', medium: '中等风险', high: '高风险（需立即干预）' };
  
  const html = `
    <div class="report-section">
      <div class="report-section-title">学生信息</div>
      <div class="report-item"><strong>学生：</strong>${studentProfile.name || '未填写'}${studentProfile.classInfo ? '（' + studentProfile.classInfo + '）' : ''}</div>
    </div>
    <div class="report-section">
      <div class="report-section-title">案例信息</div>
      <div class="report-item"><strong>来访者：</strong>${currentData.name}（${currentData.info.gender}，${currentData.info.age}）</div>
      <div class="report-item"><strong>主诉：</strong>${currentData.complaint}</div>
    </div>
    <div class="report-section">
      <div class="report-section-title">咨询过程</div>
      <div class="report-item"><strong>提问数量：</strong>${questionCount}个问题</div>
      <div class="report-item"><strong>信息收集：</strong>收集了${collectedInfo.size}个关键信息维度</div>
    </div>
    <div class="report-section">
      <div class="report-section-title">诊断评估</div>
      <div class="report-item"><strong>你的诊断：</strong>${diagnosis} ${isCorrect ? '✓' : '✗'}</div>
      <div class="report-item"><strong>正确诊断：</strong>${currentData.diagnosis}</div>
      <div class="report-item"><strong>诊断依据：</strong>${basis || '未填写'}</div>
      <div class="report-item"><strong>鉴别诊断：</strong>${differential || '未填写'}</div>
      <div class="report-item"><strong>治疗建议：</strong>${treatment || '未填写'}</div>
      <div class="report-item"><strong>风险评估：</strong>${riskLabels[risk] || '未评估'}</div>
    </div>
    <div class="report-score">
      <div class="score-number">${score}</div>
      <div class="score-label">综合得分（满分100）</div>
    </div>
  `;
  
  document.getElementById('reportBody').innerHTML = html;
  document.getElementById('reportOverlay').classList.add('active');
}

// 关闭报告
function closeReport() {
  document.getElementById('reportOverlay').classList.remove('active');
}

// 初始化
init();
</script>
